r:none;padding:4px 6px;width:100%;\n  border-radius:4px;\n}\ntd input:focus,td select:focus{background:var(--surface);outline:1.5px solid var(--primary)}\n\ninput[type=text],input[type=number],input[type=date],input[type=time],input[type=email],select,textarea{\n  width:100%;padding:10px 14px;border-radius:8px;\n  border:1.5px solid var(--border);background:var(--surface);\n  transition:border .15s, box-shadow .15s;\n}\ninput:focus,select:focus,textarea:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-lt)}\ntextarea{resize:vertical;min-height:80px;font-family:inherit}\nlabel{font-size:12px;color:var(--ink-mid);font-weight:600;display:block;margin-bottom:6px;letter-spacing:0.2px}\n\n.progress{height:8px;background:var(--bg);border-radius:50px;overflow:hidden;border:1px solid var(--border)}\n.progress > span{display:block;height:100%;background:var(--primary);border-radius:50px;transition:width .3s}\n.progress-accent > span{background:var(--accent)}\n.progress-success > span{background:var(--success)}\n\n.empty{color:var(--ink-lt);font-style:italic;padding:20px;text-align:center}\n\n/* page header */\n.page-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:24px;flex-wrap:wrap}\n.page-head h1{margin:0}\n.page-head p{margin:6px 0 0;color:var(--ink-mid);font-size:14px;max-width:640px}\n\n/* checklist item */\n.checkitem{\n  display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;cursor:pointer;\n  transition:background .15s;border:1px solid transparent;\n}\n.checkitem:hover{background:var(--bg);border-color:var(--border)}\n.check-box{width:18px;height:18px;border-radius:5px;border:1.5px solid var(--ink-lt);display:grid;place-items:center;flex-shrink:0;font-size:11px;color:#fff;background:var(--surface)}\n.checkitem.done .check-box{background:var(--success);border-color:var(--success)}\n.checkitem.done .check-text{text-decoration:line-through;color:var(--ink-lt)}\n.check-text{ ike to print.</div>\n    <div class=\"print-options\" role=\"radiogroup\" aria-label=\"Print scope\">\n      <label class=\"radio-row\">\n        <input type=\"radio\" name=\"printScope\" value=\"current\" checked>\n        <span><b>Current page</b><small>Only print the page you are viewing now.</small></span>\n      </label>\n      <label class=\"radio-row\">\n        <input type=\"radio\" name=\"printScope\" value=\"whole\">\n        <span><b>Whole planner</b><small>Print every section in one file.</small></span>\n      </label>\n    </div>\n    <div class=\"modal-actions\">\n      <button class=\"btn btn-ghost\" data-close=\"printBg\">Cancel</button>\n      <button class=\"btn btn-primary\" id=\"printRun\">Print</button>\n    </div>\n  </div>\n</div>\n<div class=\"toast\" id=\"toast\"></div>\n<input type=\"file\" id=\"importFile\" accept=\"application/json\" style=\"display:none\">\n\n<script>\n/* ====================================================================\n   ULTIMATE TRAVEL PLANNER — single-file app\n   LifePlanned · v1.0 · localStorage key: lifeplannd_travel_v1\n   ==================================================================== */\n\nconst STORE = 'lifeplannd_travel_v1';\nconst ENC_VERSION = 1;\nlet ENC_KEY = null;\nlet ENC_ENABLED = false;\nlet ENC_LOCKED_PAYLOAD = null;\nlet ENC_SAVE_BUSY = false;\nconst fmtDate = (d)=> d ? new Date(d+'T00:00:00').toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'}) : '';\nconst fmtDateShort = (d)=> d ? new Date(d+'T00:00:00').toLocaleDateString(undefined,{month:'short',day:'numeric'}) : '';\nconst today = ()=> new Date();\nconst addDays = (date,n)=>{const d=new Date(date);d.setDate(d.getDate()+n);return d};\nconst toISO = (d)=> d.toISOString().slice(0,10);\nconst uid = ()=> Math.random().toString(36).slice(2,9);\nconst money = (n,cur='USD')=>{ try{return new Intl.NumberFormat(undefined,{style:'currency',currency:cur,maximumFractionDigits:n>=100?0:2}).format(n)}catch(e){return '$'+n.toFixed(2)} };\nconst escape = s=>(s+'').replace(/[&<>\"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;',\"'\":'&#39;'}[c]));\n\n/* ----------------- ENCRYPTION ----------------- */\nconst enc = new TextEncoder();\nconst dec = new TextDecoder();\nfunction b64(bytes){ return btoa(String.fromCharCode(...new Uint8Array(bytes))); }\nfunction unb64(s){ return Uint8Array.from(atob(s), c=>c.charCodeAt(0)); }\nfunction randomBytes(n){ const a=new Uint8Array(n); crypto.getRandomValues(a); return a; }\nasync function deriveEncryptionKey(password, salt){\n  const baseKey = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);\n  return crypto.subtle.deriveKey(\n    {name:'PBKDF2',salt,iterations:250000,hash:'SHA-256'},\n    baseKey,\n    {name:'AES-GCM',length:256},\n    false,\n    ['encrypt','decrypt']\n  );\n}\nasync function encryptPlannerData(data, password){\n  const salt = randomBytes(16);\n  const iv = randomBytes(12);\n  const key = await deriveEncryptionKey(password, salt);\n  const payload = enc.encode(JSON.stringify(data));\n  const cipher = await crypto.subtle.encrypt({name:'AES-GCM',iv}, key, payload);\n  return {encrypted:true,version:ENC_VERSION,kdf:'PBKDF2-SHA256',iterations:250000,algorithm:'AES-256-GCM',salt:b64(salt),iv:b64(iv),data:b64(cipher)};\n}\nasync function decryptPlannerData(payload, password){\n  const key = await deriveEncryptionKey(password, unb64(payload.salt));\n  const plain = await crypto.subtle.decrypt({name:'AES-GCM',iv:unb64(payload.iv)}, key, unb64(payload.data));\n  return JSON.parse(dec.decode(plain));\n}\nasync function encryptWithCurrentKey(data){\n  const iv = randomBytes(12);\n  const payload = enc.encode(JSON.stringify(data));\n  const cipher = await crypto.subtle.encrypt({name:'AES-GCM',iv}, ENC_KEY, payload);\n  const current = JSON.parse(localStorage.getItem(STORE) || '{}');\n  return {...current,encrypted:true,version:ENC_VERSION,kdf:'PBKDF2-SHA256',iterations:250000,algorithm:'AES-256-GCM',iv:b64(iv),data:b64(cipher)};\n}\nfunction isEncryptedPayload(data){ return !!(data && data.encrypted && data.algorithm === 'AES-256-GCM' && data.data); }\nasync function enableEncryption(){\n  if(!crypto?.subtle){ toast('Encryption is not available in this browser'); return; }\n  const pw = prompt('Create an encryption password. If you forget it, this planner data cannot be recovered.');\n  if(!pw) return;\n  const confirmPw = prompt('Re-enter the encryption password');\n  if(pw !== confirmPw){ toast('Passwords did not match'); return; }\n  const encrypted = await encryptPlannerData(DB, pw);\n  localStorage.setItem(STORE, JSON.stringify(encrypted));\n  ENC_KEY = await deriveEncryptionKey(pw, unb64(encrypted.salt));\n  ENC_ENABLED = true;\n  FIRST_SAVE = true;\n  render();\n  toast('AES-256 encryption enabled');\n}\nasync function changeEncryptionPassword(){\n  if(!ENC_ENABLED){ await enableEncryption(); return; }\n  const pw = prompt('New encryption password');\n  if(!pw) return;\n  const confirmPw = prompt('Re-enter the new password');\n  if(pw !== confirmPw){ toast('Passwords did not match'); return; }\n  const encrypted = await encryptPlannerData(DB, pw);\n  localStorage.setItem(STORE, JSON.stringify(encrypted));\n  ENC_KEY = await deriveEncryptionKey(pw, unb64(encrypted.salt));\n  render();\n  toast('Encryption password changed');\n}\nfunction disableEncryption(){\n  if(!ENC_ENABLED) return;\n  confirmDialog('Disable encryption?','Your planner will be saved as normal readable JSON in this browser.',()=>{\n    ENC_ENABLED = false;\n    ENC_KEY = null;\n    localStorage.setItem(STORE, JSON.stringify(DB));\n    render();\n    toast('Encryption disabled');\n  });\n}\nfunction showUnlockScreen(){\n  document.body.innerHTML = `\n    <div class=\"unlock-screen\">\n      <div class=\"unlock-card\">\n        <div class=\"unlock-icon\">🔐</div>\n        <h1>Travel Planner Locked</h1>\n        <p>This planner is protected with AES-256 password encryption. Enter the password to unlock your trip data.</p>\n        <input type=\"password\" id=\"unlock-pass\" placeholder=\"Password\" autofocus>\n        <button class=\"btn btn-primary\" id=\"unlock-btn\">Unlock Planner</button>\n        <div class=\"mute\" id=\"unlock-msg\" style=\"font-size:12px;margin-top:10px\"></div>\n      </div>\n    </div>`;\n  const submit = async ()=>{\n    const pass = document.getElementById('unlock-pass').value;\n    const msg = document.getElementById('unlock-msg');\n    if(!pass){ msg.textContent='Enter the password first.'; return; }\n    try{\n      DB = await decryptPlannerData(ENC_LOCKED_PAYLOAD, pass);\n      ENC_KEY = await deriveEncryptionKey(pass, unb64(ENC_LOCKED_PAYLOAD.salt));\n      ENC_ENABLED = true;\n      ENC_LOCKED_PAYLOAD = null;\n      FIRST_SAVE = true;\n      bootUnlocked();\n    }catch(e){\n      msg.textContent = 'Password incorrect or file data is corrupted.';\n    }\n  };\n  document.getElementById('unlock-btn').addEventListener('click',submit);\n  document.getElementById('unlock-pass').addEventListener('keydown',e=>{ if(e.key==='Enter') submit(); });\n}\n\n/* ----------------- DEMO DATA ----------------- */\nfunction buildDemo(){\n  const dep = addDays(today(),14);\n  const ret = addDays(today(),24);\n  const depISO = toISO(dep);\n  const retISO = toISO(ret);\n\n  // Bookings\n  const bookings = [\n    {id:uid(),type:'✈️ Flight',supplier:'Air France · JFK → CDG',ref:'AF023',date:depISO,time:'18:30',cost:680,currency:'USD',status:'Confirmed',notes:'Window seats 14A/B'},\n    {id:uid(),type:'🏨 Hotel',supplier:'Hotel Le Marais Paris (3 nights)',ref:'HLM-44291',date:toISO(addDays(dep,1)),time:'15:00',cost:540,currency:'EUR',status:'Confirmed',notes:'Breakfast included'},\n    {id:uid(),type:'✈️ Flight',supplier:'Ryanair · CDG → FCO',ref:'FR9821',date:toISO(addDays(dep,4)),time:'08:15',cost:89,currency:'EUR',status:'Confirmed',notes:'Carry-on only'},\n    {id:uid(),type:'🏨 Hotel',supplier:'Hotel Campo de Fiori Rome (4 nights)',ref:'CDF-19884',date:toISO(addDays(dep,4)),time:'14:00',cost:360,currency:'EUR',status:'Confirmed',notes:'Rooftop room booked'},\n    {id:uid(),type:'🚌 Transfer',supplier:'Flixbus · Rome → Barcelona (overnight)',ref:'FB7720',date:toISO(addDays(dep,8)),time:'22:30',cost:35,currency:'EUR',status:'Confirmed',notes:'Seat 12'},\n    {id:uid(),type:'🏨 Hotel',supplier:'Hotel Arts Barcelona (3 nights)',ref:'HAB-77231',date:toISO(addDays(dep,9)),time:'15:00',cost:520,currency:'EUR',status:'Pending',notes:'Awaiting confirmation'},\n    {id:uid(),type:'🎭 Activity',supplier:'Louvre Skip-the-Line Tickets',ref:'LVR-22841',date:toISO(addDays(dep,2)),time:'10:00',cost:17,currency:'EUR',status:'Confirmed',notes:'2 adults'},\n  ];\n\n  // Expenses — 30 entries\n  const expCats = ['Food & Drink','Transport','Activities','Shopping','Coffee','Drinks'];\n  const expDescs = [\n    ['Dinner at Café de Flore','Lunch at Le Petit Marais','Croissant + coffee','Pizza al taglio','Gelato tasting','Tapas at La Boqueria','Wine bar Trastevere'],\n    ['Metro day pass','Uber to airport','Trenitalia Rome','Bus to Vatican','Taxi from station'],\n    ['Louvre skip-the-line','Eiffel Tower summit','Colosseum tour','Sagrada Familia','Park Güell entry'],\n    ['Souvenir scarf','Market spices','Postcards','Leather bag','Vintage finds'],\n    ['Espresso','Cappuccino','Cold brew','Latte break'],\n    ['Aperol spritz','House wine','Local craft beer','Cocktail at rooftop bar']\n  ];\n  const expenses = [];\n  for(let i=0;i<30;i++){\n    const cIdx = i%6;\n    const cat = expCats[cIdx];\n    const desc = expDescs[cIdx][i%expDescs[cIdx].length];\n    const amt = +(5 + Math.random()*115).toFixed(2);\n    const cur = i%3===0 ? 'EUR' : 'USD';\n    expenses.push({id:uid(),date:toISO(addDays(today(),-16+i)),category:cat,description:desc,amount:amt,currency:cur,paidBy:'Me',shared:false});\n  }\n\n  // Itinerary — 5 days\n  const itinerary = [\n    {day:1,date:depISO,location:'Paris',slots:[\n      {time:'09:00',activity:'Land at CDG, take RER B into city'},\n      {time:'12:00',activity:'Check in at Hotel Le Marais'},\n      {time:'14:00',activity:'Walking lunch in the Marais'},\n      {time:'16:00',activity:'Notre-Dame exterior + Île de la Cité'},\n      {time:'19:30',activity:'Dinner at Chez Janou (book ahead)'},\n      {time:'21:30',activity:'Stroll along the Seine'}\n    ]},\n    {day:2,date:toISO(addDays(dep,1)),location:'Paris',slots:[\n      {time:'09:00',activity:'Louvre — skip-the-line entry'},\n      {time:'12:30',activity:'Lunch at Café Marly'},\n      {time:'14:00',activity:'Tuileries gardens walk'},\n      {time:'16:00',activity:'Musée d\\'Orsay (Impressionists)'},\n      {time:'19:00',activity:'Wine + cheese at Le Baron Rouge'},\n      {time:'21:00',activity:'Eiffel Tower sparkle (every hour)'}\n    ]},\n    {day:3,date:toISO(addDays(dep,2)),location:'Paris',slots:[\n      {time:'08:00',activity:'Montmartre breakfast at Le Consulat'},\n      {time:'10:00',activity:'Sacré-Cœur + artist square'},\n      {time:'13:00',activity:'Crêpe lunch'},\n      {time:'15:00',activity:'Latin Quarter wander, Shakespeare & Co.'},\n      {time:'18:00',activity:'Aperitif at Place des Vosges'},\n      {time:'20:00',activity:'Dinner at Le Comptoir du Relais'}\n    ]},\n    {day:4,date:toISO(addDays(dep,3)),location:'Paris → Rome',slots:[\n      {time:'06:30',activity:'Taxi to CDG'},\n      {time:'08:15',activity:'Ryanair FR9821 to Rome'},\n      {time:'12:00',activity:'Leonardo Express into Termini'},\n      {time:'14:00',activity:'Check in at Campo de Fiori'},\n      {time:'16:00',activity:'Pantheon + Piazza Navona'},\n      {time:'20:00',activity:'Dinner in Trastevere'}\n    ]},\n    {day:5,date:toISO(addDays(dep,4)),location:'Rome',slots:[\n      {time:'08:00',activity:'Colosseum + Forum guided tour'},\n      {time:'12:30',activity:'Lunch near Monti'},\n      {time:'14:30',activity:'Capitoline Museums'},\n      {time:'17:00',activity:'Espresso at Sant\\'Eustachio'},\n      {time:'19:30',activity:'Aperitivo at Freni e Frizioni'},\n      {time:'21:00',activity:'Dinner at Roscioli'}\n    ]}\n  ];\n\n  // Packing\n  const packing = {sections:[\n    {name:'🛂 Documents',items:['Passport','Driving licence','Travel insurance docs','Vaccination card','Hotel confirmations printout','Flight tickets','Emergency contacts card'].map((n,i)=>({id:uid(),name:n,packed:i<4}))},\n    {name:'👕 Clothing',items:['T-shirts × 5','Underwear × 10','Socks × 7','Jeans','Linen pants','Dress shirts × 2','Light sweater','Rain jacket','Swimwear','Sleepwear'].map((n,i)=>({id:uid(),name:n,packed:i<3}))},\n    {name:'👟 Shoes',items:['Walking sneakers','Sandals','Dress shoes','Flip-flops'].map((n,i)=>({id:uid(),name:n,packed:i<2}))},\n    {name:'🧴 Toiletries',items:['Toothbrush','Toothpaste','Shampoo (travel)','Conditioner','Deodorant','Sunscreen SPF 50','Razor + blades','Moisturiser','Lip balm','Hairbrush'].map((n,i)=>({id:uid(),name:n,packed:i<5}))},\n    {name:'📱 Tech & Cables',items:['Phone charger','Laptop + charger','Headphones','Power bank','EU plug adapter × 2','Camera','SD card','Kindle'].map((n,i)=>({id:uid(),name:n,packed:i<3}))},\n    {name:'💊 Health & Meds',items:['Daily prescriptions','Ibuprofen','Band-aids','Imodium','Antihistamines','Hand sanitiser','Face masks'].map((n,i)=>({id:uid(),name:n,packed:i<2}))}\n  ]};\n\n  // Checklist\n  const checklist = [\n    {phase:'3 Months Out',tasks:['Renew passport (check 6mo validity)','Book flights','Reserve key accommodation','Research visa requirements','Apply for international driving permit','Start savings tracker'].map((t,i)=>({id:uid(),text:t,done:i<3}))},\n    {phase:'1 Month Out',tasks:['Notify bank of travel dates','Order foreign currency','Buy travel insurance','Confirm hotel reservations','Download offline maps','Plan day-1 itinerary','Vaccinations if needed'].map((t,i)=>({id:uid(),text:t,done:i<2}))},\n    {phase:'2 Weeks Out',tasks:['Pack first draft','Print all confirmations','Set up out-of-office','Arrange pet/plant care','Stop mail / hold deliveries','Photocopy passport'].map((t,i)=>({id:uid(),text:t,done:i<2}))},\n    {phase:'Day Before',tasks:['Final packing check','Charge all devices','Check in for flight online','Confirm airport transfer','Lock all valuables in safe','Empty trash, clean fridge'].map((t,i)=>({id:uid(),text:t,done:false}))},\n    {phase:'Day Of',tasks:['Passport in carry-on','Lock doors and windows','Set thermostat','Take photos of passport/cards','Arrive 3hr before international'].map((t,i)=>({id:uid(),text:t,done:false}))}\n  ];\n\n  const sightseeing = [\n    {id:uid(),name:'Eiffel Tower',cat:'🏛️ Landmark',cost:35,currency:'EUR',duration:'2-3 hr',priority:5,inItin:true,dest:'Paris',attachments:[]},\n    {id:uid(),name:'Louvre Museum',cat:'🎨 Museum',cost:17,currency:'EUR',duration:'4 hr',priority:5,inItin:true,dest:'Paris',attachments:[]},\n    {id:uid(),name:'Montmartre & Sacré-Cœur',cat:'🏛️ Landmark',cost:0,currency:'EUR',duration:'3 hr',priority:4,inItin:true,dest:'Paris',attachments:[]},\n    {id:uid(),name:'Colosseum + Forum',cat:'🏛️ Landmark',cost:24,currency:'EUR',duration:'3 hr',priority:5,inItin:true,dest:'Rome',attachments:[]},\n    {id:uid(),name:'Vatican Museums',cat:'🎨 Museum',cost:32,currency:'EUR',duration:'4 hr',priority:5,inItin:false,dest:'Rome',attachments:[]},\n    {id:uid(),name:'Trastevere Food Tour',cat:'🚢 Tour',cost:75,currency:'EUR',duration:'3 hr',priority:4,inItin:false,dest:'Rome',attachments:[]},\n    {id:uid(),name:'Sagrada Família',cat:'🏛️ Landmark',cost:26,currency:'EUR',duration:'2 hr',priority:5,inItin:false,dest:'Barcelona',attachments:[]},\n    {id:uid(),name:'Park Güell',cat:'🌿 Nature',cost:10,currency:'EUR',duration:'2 hr',priority:4,inItin:false,dest:'Barcelona',attachments:[]},\n    {id:uid(),name:'Barceloneta Beach',cat:'🏖️ Beach',cost:0,currency:'EUR',duration:'half day',priority:3,inItin:false,dest:'Barcelona',attachments:[]},\n    {id:uid(),name:'Flamenco Night',cat:'🎭 Show',cost:45,currency:'EUR',duration:'1.5 hr',priority:4,inItin:false,dest:'Barcelona',attachments:[]}\n  ];\n\n  const research = [\n    {id:uid(),name:'Septime (Paris)',cat:'🍽️ Restaurant',cost:80,link:'septime-charonne.fr',mustDo:true,status:'Planned'},\n    {id:uid(),name:'Promenade Plantée walk',cat:'🚶 Walk',cost:0,link:'',mustDo:false,status:'Not Yet'},\n    {id:uid(),name:'Opera Garnier night tour',cat:'🎭 Show',cost:55,link:'operadeparis.fr',mustDo:false,status:'Not Yet'},\n    {id:uid(),name:'Mercato di Testaccio',cat:'🛒 Market',cost:25,link:'',mustDo:true,status:'Planned'},\n    {id:uid(),name:'Trastevere by night',cat:'🌙 Evening',cost:60,link:'',mustDo:false,status:'Booked'}\n  ];\n\n  const journal = [\n    {id:uid(),date:depISO,location:'Paris',mood:'🤩',highlight:'First Parisian dinner',text:'Wheels-down in Paris. The light here is unreal — golden hour stretched on forever. Wandered the Marais until our feet ached, then collapsed into a candlelit bistro for steak frites. Tomorrow: the Louvre.',rating:5},\n    {id:uid(),date:toISO(addDays(dep,1)),location:'Paris',mood:'😊',highlight:'Mona Lisa & macarons',text:'Survived the Louvre crowds (barely). Stood three minutes in front of a tiny Vermeer and forgot to breathe. Picnic in the Tuileries, then macarons from Ladurée. The pistachio was a religious experience.',rating:5},\n    {id:uid(),date:toISO(addDays(dep,2)),location:'Paris',mood:'🤩',highlight:'Sunset over Montmartre',text:'Climbed every step up to Sacré-Cœur. Worth it for the view of the city from above. Sat on the steps with strangers, watched the sun melt over Paris. Bought a watercolour from a street artist for €15.',rating:5},\n    {id:uid(),date:toISO(addDays(dep,4)),location:'Rome',mood:'🤩',highlight:'Standing inside the Colosseum',text:'I was not prepared for the scale of it. The stones are warm to the touch. Pizza for lunch in a tiny piazza, gelato for dessert. Rome moves slower than Paris but it hums.',rating:5},\n    {id:uid(),date:toISO(addDays(dep,5)),location:'Rome',mood:'😊',highlight:'Cacio e pepe revelation',text:'Now I understand the fuss. Three ingredients, perfect every time. We stayed late at the trattoria, the owner brought us limoncello on the house. Rome is now in the top three.',rating:4}\n  ];\n\n  const bucket = [\n    {id:uid(),name:'Japan (Cherry Blossom Season)',flag:'🇯🇵',why:'Hanami, ryokans, Kyoto temples',best:'Late March',budget:4500,status:'Planned',priority:5},\n    {id:uid(),name:'Peru — Machu Picchu',flag:'🇵🇪',why:'Inca Trail trek, Sacred Valley',best:'May-Sept',budget:3200,status:'Dream',priority:5},\n    {id:uid(),name:'Tanzania Safari',flag:'🇹🇿',why:'Great Migration, Zanzibar finish',best:'July-Oct',budget:6500,status:'Dream',priority:4},\n    {id:uid(),name:'Amalfi Coast',flag:'🇮🇹',why:'Cliffside drives, lemon groves',best:'June',budget:2800,status:'Done',priority:5},\n    {id:uid(),name:'Bali',flag:'🇮🇩',why:'Ubud rice fields + Uluwatu surf',best:'Apr-Oct',budget:1900,status:'Done',priority:4},\n    {id:uid(),name:'Iceland Ring Road',flag:'🇮🇸',why:'Waterfalls, geothermal pools, aurora',best:'Sept-Mar',budget:3800,status:'Dream',priority:4},\n    {id:uid(),name:'Morocco — Fes & Sahara',flag:'🇲🇦',why:'Medinas, dunes, mint tea',best:'Oct-Apr',budget:2400,status:'Planned',priority:4},\n    {id:uid(),name:'New Zealand South Island',flag:'🇳🇿',why:'Fiordland, glaciers, Queenstown',best:'Dec-Feb',budget:5200,status:'Dream',priority:5},\n    {id:uid(),name:'Santorini & Greek Isles',flag:'🇬🇷',why:'White cliffs, blue domes, ferries',best:'May-Sept',budget:2700,status:'Done',priority:4},\n    {id:uid(),name:'Vietnam',flag:'🇻🇳',why:'Halong Bay, Hoi An, street food',best:'Feb-Apr',budget:1800,status:'Dream',priority:3},\n    {id:uid(),name:'Colombia',flag:'🇨🇴',why:'Cartagena, coffee region, Tayrona',best:'Dec-Mar',budget:2200,status:'Dream',priority:3}\n  ];\n\n  const savings = {\n    goal:4000,current:1840,\n    months:[\n      {month:'Jan 2025',contributed:300,running:300},\n      {month:'Feb 2025',contributed:340,running:640},\n      {month:'Mar 2025',contributed:400,running:1040},\n      {month:'Apr 2025',contributed:380,running:1420},\n      {month:'May 2025',contributed:420,running:1840}\n    ]\n  };\n\n  const split = {\n    people:['Me','Alex','Sam'],\n    expenses:[\n      {id:uid(),name:'Airbnb Paris (3 nights)',total:540,paidBy:'Me',split:'Equal'},\n      {id:uid(),name:'Rental car (4 days)',total:240,paidBy:'Alex',split:'Equal'},\n      {id:uid(),name:'Group dinner Trastevere',total:180,paidBy:'Sam',split:'Equal'},\n      {id:uid(),name:'Wine tasting tour',total:135,paidBy:'Me',split:'Equal'},\n      {id:uid(),name:'Vatican Museums tickets',total:96,paidBy:'Alex',split:'Equal'}\n    ]\n  };\n\n  const currency = {\n    base:'USD',\n    rates:{USD:1.00,EUR:0.92,GBP:0.79,AUD:1.52,CAD:1.36,NZD:1.64,JPY:151.2,CHF:0.88,\n           SEK:10.45,NOK:10.62,DKK:6.85,THB:35.6,SGD:1.34,HKD:7.82,MXN:17.1,\n           INR:83.4,IDR:15800,VND:25200,ZAR:18.6,BRL:5.05}\n  };\n\n  return {\n    user:{name:'Friend',theme:'coastal',tripType:'couple',onboarded:false},\n    overview:{\n      tripName:'Summer Escape 2025',\n      destinations:'Paris → Rome → Barcelona',\n      departure:depISO, returnDate:retISO,\n      travellers:3, currency:'USD',\n      budget:4000, budgetStyle:'Mid-Range', tripType:'Couple',\n      travellerList:[{name:'Me',split:true},{name:'Alex',split:true},{name:'Sam',split:true}]\n    },\n    bookings, expenses, packing, checklist, itinerary,\n    sightseeing, research, journal, bucket, savings, split, currency\n  };\n}\n\n/* ----------------- STATE ----------------- */\nlet DB = null;\nlet CURRENT_PAGE = 'dashboard';\nlet SAVE_TIMER = null;\nlet FIRST_SAVE = false;\n\nfunction load(){\n  try{\n    const raw = localStorage.getItem(STORE);\n    if(raw){\n      const data = JSON.parse(raw);\n      if(isEncryptedPayload(data)){\n        ENC_LOCKED_PAYLOAD = data;\n        FIRST_SAVE = true;\n        return 'locked';\n      }\n      DB = data;\n      FIRST_SAVE = true;\n      return 'ready';\n    }\n  }catch(e){}\n  DB = buildDemo();\n  return 'ready';\n}\nfunction save(){\n  if(!DB) return;\n  if(SAVE_TIMER) clearTimeout(SAVE_TIMER);\n  SAVE_TIMER = setTimeout(async ()=>{\n    try{\n      if(ENC_ENABLED && ENC_KEY){\n        if(ENC_SAVE_BUSY) return;\n        ENC_SAVE_BUSY = true;\n        localStorage.setItem(STORE, JSON.stringify(await encryptWithCurrentKey(DB)));\n        ENC_SAVE_BUSY = false;\n      }else{\n        localStorage.setItem(STORE, JSON.stringify(DB));\n      }\n      if(!FIRST_SAVE){ FIRST_SAVE=true; toast('Saved ✓'); }\n    }catch(e){\n      ENC_SAVE_BUSY = false;\n      toast('Save failed ⚠');\n    }\n  },300);\n}\nfunction toast(msg){\n  const t = document.getElementById('toast');\n  t.textContent = msg;\n  t.classList.add('show');\n  clearTimeout(t._tid);\n  t._tid = setTimeout(()=>t.classList.remove('show'),2800);\n}\n\n/* ----------------- NAV ----------------- */\nconst PAGES = [\n  {section:'Overview',items:[\n    {id:'dashboard',label:'Dashboard',ico:'🏠'},\n    {id:'overview',label:'Trip Overview',ico:'📋'},\n  ]},\n  {section:'Planning',items:[\n    {id:'research',label:'Research Hub',ico:'🔍'},\n    {id:'bookings',label:'Bookings',ico:'🏨'},\n    {id:'checklist',label:'Trip Checklist',ico:'✅'},\n    {id:'vault',label:'Document Vault',ico:'🛂'},\n    {id:'kbyg',label:'Know Before You Go',ico:'🌍'},\n  ]},\n  {section:'Itinerary',items:[\n    {id:'itinerary',label:'Smart Itinerary',ico:'🗓️'},\n    {id:'sightseeing',label:'Sightseeing',ico:'🗺️'},\n    {id:'calendar',label:'Bookings Calendar',ico:'📅'},\n  ]},\n  {section:'Money',items:[\n    {id:'budget',label:'Travel Budget',ico:'💰'},\n    {id:'expenses',label:'Expense Tracker',ico:'💳'},\n    {id:'currency',label:'Currency Converter',ico:'💱'},\n    {id:'split',label:'Split Expenses',ico:'👥'},\n  ]},\n  {section:'Packing',items:[\n    {id:'packing',label:'Packing List',ico:'🎒'},\n  ]},\n  {section:'Memories',items:[\n    {id:'journal',label:'Travel Journal',ico:'📸'},\n    {id:'bucket',label:'Bucket List',ico:'🌏'},\n    {id:'savings',label:'Savings Tracker',ico:'🐷'},\n  ]}\n];\n\nfunction renderNav(){\n  const nav = document.getElementById('nav');\n  nav.innerHTML = PAGES.map(s=>`\n    <div class=\"nav-section\">${s.section}</div>\n    ${s.items.map(it=>`<div class=\"nav-item${CURRENT_PAGE===it.id?' active':''}\" data-page=\"${it.id}\">\n      <span class=\"nav-ico\">${it.ico}</span><span class=\"nav-label\">${it.label}</span>\n    </div>`).join('')}\n  `).join('');\n  const foot = document.getElementById('navFoot');\n  foot.innerHTML = `\n    <div class=\"nav-item\" data-action=\"export\"><span class=\"nav-ico\">📤</span><span class=\"nav-label\">Export JSON</span></div>\n    <div class=\"nav-item\" data-action=\"print\"><span class=\"nav-ico\">🖨️</span><span class=\"nav-label\">Print to PDF</span></div>\n    <div class=\"nav-item${CURRENT_PAGE==='settings'?' active':''}\" data-page=\"settings\"><span class=\"nav-ico\">⚙️</span><span class=\"nav-label\">Settings</span></div>\n  `;\n  nav.querySelectorAll('[data-page]').forEach(el=>{\n    el.addEventListener('click',()=>{ go(el.dataset.page); closeMobile() });\n  });\n  foot.querySelectorAll('[data-page]').forEach(el=> el.addEventListener('click',()=>{ go(el.dataset.page); closeMobile() }));\n  foot.querySelector('[data-action=\"export\"]').addEventListener('click', exportJSON);\n  foot.querySelector('[data-action=\"print\"]').addEventListener('click', printChoice);\n}\n\nfunction updateThemeMoon(){\n  const b = document.getElementById('themeMoon');\n  if(!b || !DB) return;\n  const dark = DB.user.theme === 'dark';\n  b.textContent = dark ? '☀' : '☾';\n  b.title = dark ? 'Switch to light mode' : 'Switch to dark mode';\n  b.setAttribute('aria-label', b.title);\n}\nfunction toggleDarkMode(){\n  if(!DB.user.previousLightTheme && DB.user.theme !== 'dark') DB.user.previousLightTheme = DB.user.theme || 'coastal';\n  if(DB.user.theme === 'dark'){\n    DB.user.theme = DB.user.previousLightTheme || 'coastal';\n  }else{\n    DB.user.previousLightTheme = DB.user.theme || 'coastal';\n    DB.user.theme = 'dark';\n  }\n  document.documentElement.setAttribute('data-theme', DB.user.theme);\n  save();\n  updateThemeMoon();\n  render();\n}\nfunction printChoice(){\n  const bg = document.getElementById('printBg');\n  const current = document.querySelector('input[name=\"printScope\"][value=\"current\"]');\n  if(current) current.checked = true;\n  if(bg) bg.classList.add('show');\n}\nfunction runPrintChoice(){\n  const selected = document.querySelector('input[name=\"printScope\"]:checked')?.value || 'current';\n  document.getElementById('printBg')?.classList.remove('show');\n  setTimeout(()=> selected === 'whole' ? printWholePlanner() : window.print(), 80);\n}\nfunction printWholePlanner(){\n  const oldPage = CURRENT_PAGE;\n  const c = document.getElementById('content');\n  const allPages = PAGES.flatMap(s=>s.items);\n  c.classList.add('print-all-mode');\n  c.innerHTML = allPages.map(p=>{\n    CURRENT_PAGE = p.id;\n    upgradeData();\n    syncSightseeingToItinerary();\n    const fn = RENDERERS[p.id] || (()=>'');\n    return `<section class=\"print-page\">${fn()}</section>`;\n  }).join('');\n  CURRENT_PAGE = oldPage;\n  window.print();\n  setTimeout(()=>{ c.classList.remove('print-all-mode'); go(oldPage); }, 250);\n}\nfunction go(page){\n  CURRENT_PAGE = page;\n  renderNav();\n  render();\n  document.getElementById('content').scrollTop = 0;\n  window.scrollTo(0,0);\n}\n\n/* ----------------- HELPERS / DERIVED ----------------- */\nfunction daysUntilDeparture(){\n  const t = new Date(); t.setHours(0,0,0,0);\n  const d = new Date(DB.overview.departure+'T00:00:00');\n  return Math.round((d-t)/86400000);\n}\nfunction tripNights(){\n  const a=new Date(DB.overview.departure+'T00:00:00');\n  const b=new Date(DB.overview.returnDate+'T00:00:00');\n  return Math.max(0, Math.round((b-a)/86400000));\n}\nfunction packedPct(){\n  let total=0,packed=0;\n  DB.packing.sections.forEach(s=> s.items.forEach(i=>{ total++; if(i.packed) packed++ }));\n  return total? Math.round(packed/total*100) : 0;\n}\nfunction checklistPct(){\n  let total=0,done=0;\n  DB.checklist.forEach(p=> p.tasks.forEach(t=>{ total++; if(t.done) done++ }));\n  return total? Math.round(done/total*100) : 0;\n}\nfunction budgetCategories(){\n  const style = DB?.overview?.budgetStyle || 'Mid-Range';\n  const presets = {\n    'Backpacker': {Flights:30, Accommodation:24, 'Food & Drink':14, Activities:8, Transport:7, Shopping:3, Insurance:3, 'Emergency Fund':6, Other:5},\n    'Mid-Range':  {Flights:23, Accommodation:28, 'Food & Drink':17, Activities:11, Transport:6, Shopping:4, Insurance:2, 'Emergency Fund':4, Other:5},\n    'Luxury':     {Flights:18, Accommodation:34, 'Food & Drink':19, Activities:12, Transport:5, Shopping:3, Insurance:2, 'Emergency Fund':2, Other:5}\n  };\n  return presets[style] || presets['Mid-Range'];\n}\n\n\n/* ----------------- DATA UPGRADES ----------------- */\nfunction ensureTravellers(){\n  if(!DB.overview.travellerList){\n    const existing = DB.split?.people || ['Me'];\n    DB.overview.travellerList = existing.map(name=>({name,split:true}));\n  }\n  const count = Math.max(1, +DB.overview.travellers || DB.overview.travellerList.length || 1);\n  while(DB.overview.travellerList.length < count) DB.overview.travellerList.push({name:`Traveller ${DB.overview.travellerList.length+1}`,split:true});\n  if(DB.overview.travellerList.length > count) DB.overview.travellerList.length = count;\n  DB.split = DB.split || {people:[],expenses:[]};\n  DB.split.people = DB.overview.travellerList.filter(t=>t.split).map(t=>t.name || 'Traveller').filter(Boolean);\n  if(!DB.split.people.length) DB.split.people = DB.overview.travellerList.map(t=>t.name || 'Traveller');\n  DB.split.expenses.forEach(e=>{ if(!DB.split.people.includes(e.paidBy)) e.paidBy = DB.split.people[0]; });\n}\nfunction ensureVault(){\n  DB.vault = DB.vault || {};\n  VAULT_DEF.forEach(v=>{ if(!DB.vault[v.key]) DB.vault[v.key]={detail:v.detail,notes:'',status:v.status,attachments:[]}; });\n  Object.values(DB.vault).forEach(v=>{ v.attachments = v.attachments || []; });\n  DB.vaultOrder = DB.vaultOrder || [...VAULT_DEF.map(v=>v.key), ...Object.keys(DB.vault).filter(k=>!VAULT_DEF.some(v=>v.key===k))];\n}\nfunction ensureKbyg(){\n  if(!DB.kbyg) DB.kbyg = KBYG_DEMO.map(d=>({dest:d.dest,data:{...d.data}}));\n}\nfunction ensurePackingMatrix(){\n  ensureTravellers();\n  DB.packing.sections.forEach(s=>s.items.forEach(i=>{\n    if(!i.byTraveller) i.byTraveller = {};\n    DB.overview.travellerList.forEach(t=>{ if(i.byTraveller[t.name] === undefined) i.byTraveller[t.name] = !!i.packed; });\n  }));\n}\nfunction ensureBudgetAllocations(){\n  DB.budgetAllocations = DB.budgetAllocations || budgetCategories();\n  if(!DB.budgetAllocations.Other) DB.budgetAllocations.Other = 5;\n}\nfunction ensureCurrencyCards(){\n  DB.currency = DB.currency || {base:'USD',rates:{}};\n  DB.currency.quickCards = DB.currency.quickCards || ['EUR','GBP','AUD','CAD','JPY','CHF','SGD'];\n  DB.currency.quickCards = DB.currency.quickCards.filter(c=>DB.currency.rates[c]);\n  if(!DB.currency.quickCards.length) DB.currency.quickCards = Object.keys(DB.currency.rates).filter(c=>c!==DB.currency.base).slice(0,6);\n}\nfunction ensureAttachments(){\n  ['sightseeing','journal','bookings','bucket'].forEach(k=>(DB[k]||[]).forEach(x=>{ x.attachments = x.attachments || []; }));\n}\nfunction upgradeData(){\n  ensureTravellers(); ensureVault(); ensureKbyg(); ensurePackingMatrix(); ensureBudgetAllocations(); ensureCurrencyCards(); ensureAttachments();\n}\nfunction attachmentList(items){\n  items = items || [];\n  if(!items.length) return '<div class=\"mute\" style=\"font-size:11px\">No attachments yet</div>';\n  return `<div class=\"attach-list\">${items.map((a,i)=>{\n    const name = escape(a.name||a);\n    const img = a.dataUrl && (a.type||'').startsWith('image/')\n      ? `<img class=\"attach-thumb\" src=\"${a.dataUrl}\" alt=\"${name}\">`\n      : `<span class=\"attach-file\">📎</span>`;\n    return `<span class=\"attach-chip attach-visual\">${img}<span>${name}</span><button type=\"button\" class=\"mini-x\" data-att-del=\"${i}\">×</button></span>`;\n  }).join('')}</div>`;\n}\nfunction readFileAsDataUrl(file){\n  return new Promise(resolve=>{\n    const meta = {name:file.name,size:file.size,type:file.type,added:toISO(new Date())};\n    if(!file.type.startsWith('image/')) return resolve(meta);\n    const reader = new FileReader();\n    reader.onload = ()=>resolve({...meta,dataUrl:reader.result});\n    reader.onerror = ()=>resolve(meta);\n    reader.readAsDataURL(file);\n  });\n}\nasync function captureAttachmentsAsync(files){\n  return Promise.all(Array.from(files||[]).map(readFileAsDataUrl));\n}\nfunction syncSightseeingToItinerary(){\n  DB.itinerary.forEach(day=>{ day.slots = day.slots.filter(s=>!s.sourceSightseeingId); });\n  DB.sightseeing.filter(a=>a.inItin).forEach(a=>{\n    const day = DB.itinerary.find(d=> (d.location||'').toLowerCase().includes((a.dest||'').toLowerCase())) || DB.itinerary[0];\n    if(!day) return;\n    day.slots.push({time:'',activity:a.name,sourceSightseeingId:a.id,sourceAttachments:a.attachments||[]});\n  });\n  DB.itinerary.forEach(day=>day.slots.sort((a,b)=>(a.time||'99:99').localeCompare(b.time||'99:99')));\n}\nfunction totalSpent(){\n  const rates = DB.currency.rates;\n  const home = DB.overview.currency || DB.currency.base || 'USD';\n  return DB.expenses.reduce((s,e)=>{\n    const fromRate = rates[e.currency] || 1;\n    const homeRate = rates[home] || 1;\n    return s + ((+e.amount || 0) / fromRate) * homeRate;\n  },0);\n}\n\n/* ----------------- PAGE RENDERER ----------------- */\nconst RENDERERS = {};\n\nfunction render(){\n  document.getElementById('crumbTitle').textContent = pageTitle();\n  document.getElementById('tripBadge').textContent = DB.overview.tripName;\n  updateThemeMoon();\n  document.getElementById('printHeader').textContent = `✈️ Ultimate Travel Planner · ${DB.overview.tripName} · Printed ${new Date().toLocaleDateString()}`;\n  const c = document.getElementById('content');\n  c.classList.toggle('content-wide', CURRENT_PAGE==='bookings');\n  upgradeData();\n  syncSightseeingToItinerary();\n  const fn = RENDERERS[CURRENT_PAGE] || RENDERERS.dashboard;\n  c.innerHTML = fn();\n  // wire up page-specific handlers\n  if(WIRES[CURRENT_PAGE]) WIRES[CURRENT_PAGE]();\n}\nfunction pageTitle(){\n  if(CURRENT_PAGE==='settings') return 'Settings';\n  for(const s of PAGES) for(const it of s.items) if(it.id===CURRENT_PAGE) return it.label;\n  return 'Dashboard';\n}\n\nconst WIRES = {};\n\n/* ===================== DASHBOARD ===================== */\nRENDERERS.dashboard = ()=>{\n  const days = daysUntilDeparture();\n  const nights = tripNights();\n  const spent = totalSpent();\n  const remaining = DB.overview.budget - spent;\n  const allocPct = Math.min(100, Math.round(spent/DB.overview.budget*100));\n  const pct = packedPct();\n  const cpct = checklistPct();\n  const upcoming = [...DB.bookings].sort((a,b)=> a.date.localeCompare(b.date)).slice(0,5);\n\n  return `\n    <div class=\"page-head\">\n      <div>\n        <h1>Welcome back, ${escape(DB.user.name)}.</h1>\n        <p>Your trip to <b>${escape(DB.overview.destinations)}</b> is taking shape. Here's the latest.</p>\n      </div>\n    </div>\n\n    <div class=\"grid grid-4 mb\">\n      <div class=\"stat\"><div class=\"stat-label\">Days Until Departure</div>\n        <div class=\"stat-val\">${days >= 0 ? days : 'On Trip'}</div>\n        <div class=\"stat-sub\">${fmtDate(DB.overview.departure)}</div>\n      </div>\n      <div class=\"stat stat-secondary\"><div class=\"stat-label\">Trip Nights</div>\n        <div class=\"stat-val\">${nights}</div>\n        <div class=\"stat-sub\">${fmtDateShort(DB.overview.departure)} – ${fmtDateShort(DB.overview.returnDate)}</div>\n      </div>\n      <div class=\"stat stat-accent\"><div class=\"stat-label\">Budget Allocated</div>\n        <div class=\"stat-val\">${allocPct}%</div>\n        <div class=\"stat-sub\">${money(spent,DB.overview.currency)} of ${money(DB.overview.budget,DB.overview.currency)}</div>\n      </div>\n      <div class=\"stat stat-success\"><div class=\"stat-label\">% Packed</div>\n        <div class=\"stat-val\">${pct}%</div>\n        <div class=\"stat-sub\">${DB.packing.sections.reduce((a,s)=>a+s.items.length,0)} items total</div>\n      </div>\n    </div>\n\n    <div class=\"grid grid-2 mb\">\n      <div class=\"card\">\n        <div class=\"card-head\">\n          <div><div class=\"card-title\">${escape(DB.overview.tripName)}</div>\n            <div class=\"card-sub\">${escape(DB.overview.destinations)}</div>\n          </div>\n          <button class=\"btn btn-secondary btn-sm\" data-go=\"overview\">Edit</button>\n        </div>\n        <div class=\"fl\" style=\"gap:8px;flex-wrap:wrap;margin-bottom:14px\">\n          <span class=\"badge\">${escape(DB.overview.tripType)}</span>\n          <span class=\"badge badge-accent\">${escape(DB.overview.budgetStyle)}</span>\n          <span class=\"badge badge-ghost\">${DB.overview.travellers} traveller${DB.overview.travellers>1?'s':''}</span>\n          <span class=\"badge badge-secondary\">${escape(DB.overview.currency)}</span>\n        </div>\n        <div class=\"grid grid-2\" style=\"gap:10px\">\n          <div class=\"info-tile\"><div class=\"info-tile-label\">Departure</div><div class=\"info-tile-val\">${fmtDate(DB.overview.departure)}</div></div>\n          <div class=\"info-tile\"><div class=\"info-tile-label\">Return</div><div class=\"info-tile-val\">${fmtDate(DB.overview.returnDate)}</div></div>\n        </div>\n      </div>\n      <div class=\"card\">\n        <div class=\"card-head\">\n          <div><div class=\"card-title\">Budget at a Glance</div><div class=\"card-sub\">Tracking against ${money(DB.overview.budget,DB.overview.currency)}</div></div>\n          <button class=\"btn btn-secondary btn-sm\" data-go=\"budget\">Details</button>\n        </div>\n        <div class=\"grid grid-3\" style=\"gap:10px;margin-bottom:14px\">\n          <div class=\"info-tile\"><div class=\"info-tile-label\">Spent</div><div class=\"info-tile-val\">${money(spent,DB.overview.currency)}</div></div>\n          <div class=\"info-tile\"><div class=\"info-tile-label\">Remaining</div><div class=\"info-tile-val\">${money(remaining,DB.overview.currency)}</div></div>\n          <div class=\"info-tile\"><div class=\"info-tile-label\">Daily Avg</div><div class=\"info-tile-val\">${money(DB.overview.budget/Math.max(1,nights),DB.overview.currency)}</div></div>\n        </div>\n        <div class=\"progress\"><span style=\"width:${allocPct}%\"></span></div>\n        <div class=\"mute\" style=\"font-size:12px;margin-top:8px\">${allocPct}% of total budget spent</div>\n      </div>\n    </div>\n\n    <div class=\"card mb\">\n      <div class=\"card-head\">\n        <div><div class=\"card-title\">Upcoming Bookings</div><div class=\"card-sub\">Next 5 by date</div></div>\n        <button class=\"btn btn-secondary btn-sm\" data-go=\"bookings\">View All</button>\n      </div>\n      <div class=\"table-wrap\">\n        <table><thead><tr><th>Type</th><th>Supplier</th><th>Date</th><th>Ref</th><th>Cost</th><th>Status</th></tr></thead>\n        <tbody>${upcoming.map(b=>`<tr>\n          <td>${escape(b.type)}</td><td>${escape(b.supplier)}</td>\n          <td class=\"tabular\">${fmtDateShort(b.date)}</td><td>${escape(b.ref)}</td>\n          <td class=\"tabular\">${money(b.cost,b.currency)}</td>\n          <td>${statusBadge(b.status)}</td>\n        </tr>`).join('')}</tbody></table>\n      </div>\n    </div>\n\n    <div class=\"grid grid-2\">\n      <div class=\"card\">\n        <div class=\"card-head\">\n          <div><div class=\"card-title\">Checklist Progress</div><div class=\"card-sub\">${cpct}% complete</div></div>\n          <button class=\"btn btn-secondary btn-sm\" data-go=\"checklist\">Full List</button>\n        </div>\n        <div class=\"progress progress-success mb\"><span style=\"width:${cpct}%\"></span></div>\n        ${DB.checklist.slice(0,3).map(p=>`\n          <div style=\"margin-bottom:10px\"><b style=\"font-size:13px\">${escape(p.phase)}</b>\n            <div style=\"margin-top:4px\">${p.tasks.slice(0,3).map(t=>`\n              <div class=\"checkitem ${t.done?'done':''}\" style=\"padding:5px 8px\">\n                <div class=\"check-box\">${t.done?'✓':''}</div>\n                <div class=\"check-text\">${escape(t.text)}</div>\n              </div>`).join('')}</div>\n          </div>`).join('')}\n      </div>\n      <div class=\"card\">\n        <div class=\"card-head\">\n          <div><div class=\"card-title\">Packing Progress</div><div class=\"card-sub\">${pct}% complete</div></div>\n          <button class=\"btn btn-secondary btn-sm\" data-go=\"packing\">Manage</button>\n        </div>\n        <div class=\"progress progress-accent mb\"><span style=\"width:${pct}%\"></span></div>\n        ${DB.packing.sections.map(s=>{\n          const tot = s.items.length, p = s.items.filter(i=>i.packed).length;\n          const pp = tot? Math.round(p/tot*100):0;\n          return `<div style=\"margin-bottom:10px\">\n            <div class=\"fl spread\" style=\"font-size:12.5px;margin-bottom:4px\"><span><b>${escape(s.name)}</b></span><span class=\"mute\">${p}/${tot} · ${pp}%</span></div>\n            <div class=\"progress\" style=\"height:6px\"><span style=\"width:${pp}%\"></span></div>\n          </div>`;\n        }).join('')}\n      </div>\n    </div>\n  `;\n};\nWIRES.dashboard = ()=>{\n  document.querySelectorAll('[data-go]').forEach(el=> el.addEventListener('click',()=>go(el.dataset.go)));\n};\n\nfunction statusBadge(s){\n  const v = (s||'').toLowerCase();\n  if(v==='confirmed') return `<span class=\"badge badge-success\">${escape(s)}</span>`;\n  if(v==='pending')   return `<span class=\"badge badge-warning\">${escape(s)}</span>`;\n  if(v==='cancelled') return `<span class=\"badge badge-danger\" style=\"text-decoration:line-through\">${escape(s)}</span>`;\n  if(v==='planned')   return `<span class=\"badge badge-accent\">${escape(s)}</span>`;\n  if(v==='booked')    return `<span class=\"badge badge-success\">${escape(s)}</span>`;\n  if(v==='visited' || v==='done') return `<span class=\"badge badge-success\">${escape(s)}</span>`;\n  if(v==='not yet')   return `<span class=\"badge badge-ghost\">${escape(s)}</span>`;\n  if(v==='valid' || v==='active') return `<span class=\"badge badge-success\">${escape(s)}</span>`;\n  if(v==='incomplete' || v==='add info') return `<span class=\"badge badge-warning\">${escape(s)}</span>`;\n  return `<span class=\"badge\">${escape(s)}</span>`;\n}\n\n/* ===================== TRIP OVERVIEW ===================== */\nRENDERERS.overview = ()=>{\n  ensureTravellers();\n  const o = DB.overview;\n  const nights = tripNights();\n  return `\n    <div class=\"page-head\">\n      <div><h1>Trip Overview</h1>\n        <p>The bones of your trip. Edit anything — it saves as you type without stealing focus.</p>\n      </div>\n    </div>\n\n    <div class=\"card mb\">\n      <div class=\"card-head\"><div class=\"card-title\">Trip Details</div></div>\n      <div class=\"grid grid-2\">\n        <div><label>Trip Name</label><input type=\"text\" id=\"ov-name\" value=\"${escape(o.tripName)}\"></div>\n        <div><label>Destinations</label><input type=\"text\" id=\"ov-dest\" value=\"${escape(o.destinations)}\"></div>\n        <div><label>Departure Date</label><input type=\"date\" id=\"ov-dep\" value=\"${o.departure}\"></div>\n        <div><label>Return Date</label><input type=\"date\" id=\"ov-ret\" value=\"${o.returnDate}\"></div>\n        <div><label>Number of Travellers</label><input type=\"number\" id=\"ov-tr\" value=\"${o.travellers}\" min=\"1\"></div>\n        <div><label>Home Currency</label>\n          <select id=\"ov-cur\">${Object.keys(DB.currency.rates).map(c=>`<option ${c===o.currency?'selected':''}>${c}</option>`).join('')}</select>\n        </div>\n        <div><label>Total Budget</label><input type=\"number\" id=\"ov-bud\" value=\"${o.budget}\" step=\"50\"></div>\n        <div><label>Budget Style</label>\n          <select id=\"ov-style\">${['Backpacker','Mid-Range','Luxury'].map(s=>`<option ${s===o.budgetStyle?'selected':''}>${s}</option>`).join('')}</select>\n        </div>\n        <div><label>Trip Type</label>\n          <select id=\"ov-type\">${['Solo','Couple','Group','Family','Road Trip','Cruise'].map(s=>`<option ${s===o.tripType?'selected':''}>${s}</option>`).join('')}</select>\n        </div>\n        <div><label>Theme</label>\n          <select id=\"ov-theme\">\n            <option value=\"coastal\" ${DB.user.theme==='coastal'?'selected':''}>Coastal</option>\n            <option value=\"tropical\" ${DB.user.theme==='tropical'?'selected':''}>Tropical</option>\n            <option value=\"desert\" ${DB.user.theme==='desert'?'selected':''}>Desert Luxe</option>\n          </select>\n        </div>\n      </div>\n    </div>\n\n    <div class=\"card mb\">\n      <div class=\"card-head\">\n        <div><div class=\"card-title\">Travellers</div><div class=\"card-sub\">Tick who should be included in split expenses.</div></div>\n      </div>\n      <div class=\"traveller-grid\">\n        ${o.travellerList.map((t,i)=>`<div class=\"traveller-row\">\n          <input type=\"text\" value=\"${escape(t.name)}\" data-tv=\"${i}\" placeholder=\"Traveller name\">\n          <label class=\"tick-label\"><input type=\"checkbox\" data-tv-split=\"${i}\" ${t.split?'checked':''}> Split expenses</label>\n        </div>`).join('')}\n      </div>\n    </div>\n\n    <div class=\"grid grid-4\">\n      <div class=\"stat\"><div class=\"stat-label\">Trip Length</div><div class=\"stat-val\">${nights}</div><div class=\"stat-sub\">nights</div></div>\n      <div class=\"stat stat-secondary\"><div class=\"stat-label\">Travellers</div><div class=\"stat-val\">${o.travellers}</div><div class=\"stat-sub\">${DB.split.people.length} splitting costs</div></div>\n      <div class=\"stat stat-accent\"><div class=\"stat-label\">Budget / Day</div><div class=\"stat-val\">${money(o.budget/Math.max(1,nights),o.currency)}</div><div class=\"stat-sub\">planned average</div></div>\n      <div class=\"stat stat-success\"><div class=\"stat-label\">Budget / Traveller</div><div class=\"stat-val\">${money(o.budget/Math.max(1,o.travellers),o.currency)}</div><div class=\"stat-sub\">rough share</div></div>\n    </div>\n  `;\n};\nWIRES.overview = ()=>{\n  const map = {'ov-name':'tripName','ov-dest':'destinations','ov-dep':'departure','ov-ret':'returnDate','ov-tr':'travellers','ov-cur':'currency','ov-bud':'budget','ov-style':'budgetStyle','ov-type':'tripType'};\n  Object.entries(map).forEach(([id,key])=>{\n    const el = document.getElementById(id);\n    const handler = ()=>{\n      let v = el.value;\n      if(key==='travellers'||key==='budget') v = +v;\n      DB.overview[key] = v;\n      ensureTravellers();\n      save();\n      if(['departure','returnDate','travellers','currency','budget','budgetStyle'].includes(key)) render();\n    };\n    el.addEventListener(key==='tripName'||key==='destinations'?'input':'change', handler);\n  });\n  document.querySelectorAll('[data-tv]').forEach(el=>el.addEventListener('input',()=>{\n    DB.overview.travellerList[+el.dataset.tv].name = el.value;\n    ensureTravellers(); save();\n  }));\n  document.querySelectorAll('[data-tv-split]').forEach(el=>el.addEventListener('change',()=>{\n    DB.overview.travellerList[+el.dataset.tvSplit].split = el.checked;\n    ensureTravellers(); save(); render();\n  }));\n  document.getElementById('ov-theme').addEventListener('change', e=>{\n    DB.user.theme = e.target.value;\n    document.documentElement.setAttribute('data-theme', e.target.value);\n    save(); toast('Theme changed');\n  });\n};\n\n/* ===================== RESEARCH HUB ===================== *//* ===================== RESEARCH HUB ===================== */\nRENDERERS.research = ()=>{\n  const cats = ['🍽️ Restaurant','🚶 Walk','🎭 Show','🛒 Market','🏛️ Landmark','🌙 Evening','Other'];\n  const statuses = ['Not Yet','Planned','Booked','Visited','Done'];\n  return `\n    <div class=\"page-head\">\n      <div><h1>Research Hub</h1>\n        <p>Capture every restaurant, walk, market and idea you've bookmarked. Mark must-dos with a tick.</p>\n      </div>\n      <button class=\"btn btn-primary\" id=\"rs-add\">＋ Add Item</button>\n    </div>\n    <div class=\"card\">\n      <div class=\"table-wrap\">\n        <table>\n          <thead><tr><th>Name</th><th>Category</th><th>Est. Cost</th><th>Link</th><th style=\"text-align:center\">Must-Do</th><th>Status</th><th></th></tr></thead>\n          <tbody>${DB.research.map((r,i)=>`<tr data-i=\"${i}\">\n            <td><input type=\"text\" value=\"${escape(r.name)}\" data-k=\"name\"></td>\n            <td><select data-k=\"cat\">${cats.map(c=>`<option ${c===r.cat?'selected':''}>${c}</option>`).join('')}</select></td>\n            <td><input type=\"number\" value=\"${r.cost}\" data-k=\"cost\" step=\"1\" style=\"max-width:90px\"></td>\n            <td><input type=\"text\" value=\"${escape(r.link||'')}\" data-k=\"link\" placeholder=\"url\"></td>\n            <td style=\"text-align:center\"><input type=\"checkbox\" data-k=\"mustDo\" ${r.mustDo?'checked':''}></td>\n            <td><select data-k=\"status\">${statuses.map(s=>`<option ${s===r.status?'selected':''}>${s}</option>`).join('')}</select></td>\n            <td><button class=\"row-del\" data-del=\"${i}\">×</button></td>\n          </tr>`).join('')}</tbody>\n        </table>\n      </div>\n    </div>\n  `;\n};\nWIRES.research = ()=>{\n  document.querySelectorAll('#content tr[data-i]').forEach(tr=>{\n    const i = +tr.dataset.i;\n    tr.querySelectorAll('[data-k]').forEach(el=>{\n      el.addEventListener('change',()=>{\n        const k = el.dataset.k;\n        let v = el.type==='checkbox' ? el.checked : (el.type==='number'? +el.value : el.value);\n        DB.research[i][k] = v; save();\n      });\n    });\n  });\n  document.querySelectorAll('[data-del]').forEach(b=> b.addEventListener('click',()=>{\n    DB.research.splice(+b.dataset.del,1); save(); render();\n  }));\n  document.getElementById('rs-add').addEventListener('click',()=>{\n    DB.research.push({id:uid(),name:'New idea',cat:'🍽️ Restaurant',cost:0,link:'',mustDo:false,status:'Not Yet'});\n    save(); render();\n  });\n};\n\n/* ===================== BOOKINGS ===================== */\nRENDERERS.bookings = ()=>{\n  const statuses = ['Confirmed','Pending','Cancelled','Booked','Planned'];\n  const codes = Object.keys(DB.currency.rates || {USD:1,EUR:1,GBP:1,AUD:1});\n  const sorted = [...DB.bookings].sort((a,b)=> a.date.localeCompare(b.date));\n  return `\n    <div class=\"page-head\">\n      <div><h1>Bookings &amp; Reservations</h1>\n        <p>Update status, notes, attachments, cost and currency directly in the table.</p>\n      </div>\n      <button class=\"btn btn-primary\" id=\"bk-add\">＋ Add Booking</button>\n    </div>\n    <div class=\"card\">\n      <div class=\"table-wrap\">\n        <table class=\"bookings-table\">\n          <thead><tr><th class=\"bk-type-col\">Type</th><th class=\"bk-supplier-col\">Supplier</th><th class=\"bk-date-col\">Date &amp; Time</th><th class=\"bk-ref-col\">Ref</th><th class=\"bk-cost-col\">Cost &amp; Currency</th><th class=\"bk-status-col\">Status</th><th class=\"bk-notes-col\">Notes</th><th class=\"bk-attach-col\">Attachments</th><th class=\"bk-action-col\"></th></tr></thead>\n          <tbody>${sorted.map(b=>{\n            const i = DB.bookings.findIndex(x=>x.id===b.id);\n            return `<tr data-i=\"${i}\">\n              <td class=\"bk-type-col\"><input type=\"text\" value=\"${escape(b.type)}\" data-bk=\"type\"></td>\n              <td class=\"bk-supplier-col\"><input type=\"text\" value=\"${escape(b.supplier)}\" data-bk=\"supplier\"></td>\n              <td class=\"bk-date-col\"><div class=\"bk-inline bk-date-time\"><input type=\"date\" value=\"${escape(b.date)}\" data-bk=\"date\"><input type=\"time\" value=\"${escape(b.time||'')}\" data-bk=\"time\"></div></td>\n              <td class=\"bk-ref-col\"><input type=\"text\" value=\"${escape(b.ref)}\" data-bk=\"ref\"></td>\n              <td class=\"bk-cost-col\"><div class=\"bk-inline bk-cost-currency\"><input type=\"number\" value=\"${b.cost}\" data-bk=\"cost\"><select data-bk=\"currency\">${codes.map(c=>`<option ${c===(b.currency||DB.overview.currency)?'selected':''}>${c}</option>`).join('')}</select></div></td>\n              <td class=\"bk-status-col\"><select class=\"status-select\" data-bk=\"status\">${statuses.map(s=>`<option ${s===b.status?'selected':''}>${s}</option>`).join('')}</select></td>\n              <td class=\"bk-notes-col\"><textarea data-bk=\"notes\">${escape(b.notes||'')}</textarea></td>\n              <td class=\"bk-attach-col\"><div class=\"booking-attachments\">${attachmentList(b.attachments)}<label class=\"file-pill booking-file-pill\">Add image/file<input type=\"file\" multiple accept=\"image/*,.pdf,.doc,.docx\" data-bk-file=\"${i}\"></label></div></td>\n              <td class=\"bk-action-col\"><button class=\"row-del\" data-del=\"${i}\">×</button></td>\n            </tr>`;\n          }).join('')}</tbody>\n        </table>\n      </div>\n    </div>\n  `;\n};\nWIRES.bookings = ()=>{\n  document.querySelectorAll('#content tr[data-i]').forEach(tr=>{\n    const i=+tr.dataset.i;\n    tr.querySelectorAll('[data-bk]').forEach(el=>el.addEventListener('change',()=>{\n      const k=el.dataset.bk;\n      DB.bookings[i][k]=el.type==='number'?+el.value:el.value; save();\n      if(k==='currency'||k==='cost') render();\n    }));\n  });\n  document.querySelectorAll('[data-bk-file]').forEach(el=>el.addEventListener('change',async()=>{\n    const i=+el.dataset.bkFile;\n    DB.bookings[i].attachments = [...(DB.bookings[i].attachments||[]), ...(await captureAttachmentsAsync(el.files))];\n    save(); render();\n  }));\n  document.querySelectorAll('[data-att-del]').forEach(b=>b.addEventListener('click',e=>{\n    const tr=e.target.closest('tr'); if(!tr) return;\n    DB.bookings[+tr.dataset.i].attachments.splice(+b.dataset.attDel,1); save(); render();\n  }));\n  document.querySelectorAll('[data-del]').forEach(b=> b.addEventListener('click',()=>{\n    DB.bookings.splice(+b.dataset.del,1); save(); render();\n  }));\n  document.getElementById('bk-add').addEventListener('click', openBookingModal);\n};\n\n/* ===================== CHECKLIST ===================== *//* ===================== CHECKLIST ===================== */\nRENDERERS.checklist = ()=>{\n  const dep = new Date(DB.overview.departure+'T00:00:00');\n  const offsets = {'3 Months Out':-90,'1 Month Out':-30,'2 Weeks Out':-14,'Day Before':-1,'Day Of':0,'Calendar To Do':0};\n  return `\n    <div class=\"page-head\">\n      <div><h1>Trip Checklist</h1>\n        <p>${checklistPct()}% complete. Add, edit, date, remove tasks, or delete a whole section.</p>\n      </div>\n      <button class=\"btn btn-primary\" id=\"cl-phase\">＋ Add Section</button>\n    </div>\n    <div class=\"grid grid-2\">\n      ${DB.checklist.map((p,pi)=>{\n        const dueDate = addDays(dep, offsets[p.phase]||0);\n        const done = p.tasks.filter(t=>t.done).length;\n        return `<div class=\"card\">\n          <div class=\"card-head\">\n            <div><input class=\"section-title-input\" value=\"${escape(p.phase)}\" data-phase=\"${pi}\">\n              <div class=\"card-sub\">${done}/${p.tasks.length} done · default by ${fmtDateShort(toISO(dueDate))}</div>\n            </div>\n            <div class=\"fl\" style=\"gap:6px\">\n              <button class=\"btn btn-ghost btn-sm\" data-cl-add=\"${pi}\">+ Task</button>\n              <button class=\"row-del\" data-cl-del-section=\"${pi}\" title=\"Delete section\">×</button>\n            </div>\n          </div>\n          <div>${p.tasks.map((t,ti)=>`\n            <div class=\"checkitem-edit ${t.done?'done' list[+b.dataset.clAdd].tasks.push({id:uid(),text:'New task',done:false,date:''}); save(); render(); }));\n  document.getElementById('cl-phase').addEventListener('click',()=>{ DB.checklist.push({phase:'New Section',tasks:[{id:uid(),text:'New task',done:false,date:''}]}); save(); render(); });\n};\n\n/* ===================== DOCUMENT VAULT/* ===================== DOCUMENT VAULT ===================== *//* ===================== DOCUMENT VAULT ===================== */\nconst VAULT_DEF = [\n  {key:'passports',ico:'🛂',name:'Passports',detail:'Valid through Jul 2031',status:'Valid'},\n  {key:'insurance',ico:'🛡️',name:'Travel Insurance',detail:'Allianz · Policy AZ-998127',status:'Active'},\n  {key:'flights',ico:'✈️',name:'Flight Details',detail:'Air France AF023 confirmed',status:'Confirmed'},\n  {key:'hotels',ico:'🏨',name:'Hotel Bookings',detail:'3 confirmations on file',status:'Confirmed'},\n  {key:'health',ico:'🏥',name:'Healthcare Info',detail:'EHIC + GeoBlue card photos',status:'Active'},\n  {key:'emergency',ico:'☎️',name:'Emergency Contacts',detail:'Family + embassy lines',status:'Valid'},\n  {key:'visa',ico:'📜',name:'Visa Requirements',detail:'Schengen — no visa for US passport',status:'Valid'},\n  {key:'rx',ico:'💊',name:'Prescription Details',detail:'2 daily meds + doctor letter',status:'Incomplete'},\n  {key:'access',ico:'🔑',name:'Accommodation Access',detail:'Codes & arrival instructions',status:'Add Info'}\n];\nRENDERERS.vault = ()=>{\n  ensureVault();\n  return `\n    <div class=\"page-head\">\n      <div><h1>Document Vault</h1>\n        <p>Add cards and attach supporting files by name so nothing gets missed.</p>\n      </div>\n      <button class=\"btn btn-primary\" id=\"vault-add\">＋ Add Card</button>\n    </div>\n    <div class=\"grid grid-3\">\n      ${DB.vaultOrder.map(k=>{\n        const preset = VAULT_DEF.find(v=>v.key===k) || {key:k,ico:'📎',name:DB.vault[k]?.name||'New Document',detail:'',status:'Add Info'};\n        const d = DB.vault[k]||{};\n        return `<div class=\"vault-card\" data-vk=\"${k}\">\n          <div class=\"vault-ico\">${preset.ico}</div>\n          <input class=\"vault-name-input\" data-vf=\"name\" value=\"${escape(d.name||preset.name)}\">\n          <div class=\"vault-detail\">${escape(d.detail||preset.detail||'—')}</div>\n          ${statusBadge(d.status||preset.status)}\n          <div class=\"vault-edit\">\n            <label>Detail</label><input type=\"text\" data-vf=\"detail\" value=\"${escape(d.detail||preset.detail||'')}\">\n            <div style=\"margin-top:8px\"><label>Notes</label><textarea data-vf=\"notes\">${escape(d.notes||'')}</textarea></div>\n            <div style=\"margin-top:8px\"><label>Status</label>\n              <select data-vf=\"status\">${['Valid','Active','Confirmed','Incomplete','Add Info'].map(s=>`<option ${s===(d.status||preset.status)?'selected':''}>${s}</option>`).join('')}</select>\n            </div>\n            <div style=\"margin-top:8px\"><label>Attachments</label>${attachmentList(d.attachments)}<label class=\"file-pill\">Add attachments<input type=\"file\" multiple data-vault-file=\"${k}\"></label></div>\n            <button class=\"row-del\" data-vault-del=\"${k}\" style=\"margin-top:8px\">Delete card</button>\n          </div>\n        </div>`;\n      }).join('')}\n    </div>\n  `;\n};\nWIRES.vault = ()=>{\n  document.querySelectorAll('.vault-card').forEach(card=>{\n    const k = card.dataset.vk;\n    card.addEventListener('click',e=>{ if(e.target.closest('.vault-edit') || e.target.matches('input,textarea,select,button,label')) return; card.classList.toggle('open'); });\n    card.querySelectorAll('[data-vf]').forEach(el=>el.addEventListener('change',()=>{\n      DB.vault[k] = DB.vault[k] || {attachments:[]};\n      DB.vault[k][el.dataset.vf] = el.value; save(); if(el.dataset.vf==='status') render();\n    }));\n  });\n  document.querySelectorAll('[data-vault-file]').forEach(el=>el.addEventListener('change',async()=>{\n    const k=el.dataset.vaultFile; DB.vault[k].attachments=[...(DB.vault[k].attachments||[]),...(await captureAttachmentsAsync(el.files))]; save(); render();\n  }));\n  document.querySelectorAll('[data-vault-del]').forEach(b=>b.addEventListener('click',e=>{ e.stopPropagation(); delete DB.vault[b.dataset.vaultDel]; DB.vaultOrder=DB.vaultOrder.filter(k=>k!==b.dataset.vaultDel); save(); render(); }));\n  document.querySelectorAll('[data-att-del]').forEach(b=>b.addEventListener('click',e=>{ const card=e.target.closest('.vault-card'); DB.vault[card.dataset.vk].attachments.splice(+b.dataset.attDel,1); save(); render(); }));\n  document.getElementById('vault-add').addEventListener('click',()=>{ const k='custom_'+uid(); DB.vault[k]={name:'New Document Card',detail:'',notes:'',status:'Add Info',attachments:[]}; DB.vaultOrder.push(k); save(); render(); });\n};\n\n/* ===================== KNOW BEFORE YOU GO ===================== *//* ===================== KNOW BEFORE YOU GO ===================== */\nconst KBYG_DEMO = [\n  {dest:'Paris, France',data:{'Time Zone':'CET (UTC+1)','Voltage & Plug':'230V · Type C/E','Language':'French (English widely understood)','Tipping':'5–10% rounded up','Tap Water':'Safe to drink','Weather':'Avg 18-25°C, light layers','Emergency':'112 (general), 17 (police)','Transport':'Metro, RER, Vélib bikes','Cultural Notes':'Greet with \"Bonjour\", quiet on metro'}},\n  {dest:'Rome, Italy',data:{'Time Zone':'CET (UTC+1)','Voltage & Plug':'230V · Type F/L','Language':'Italian (basic English in tourist areas)','Tipping':'Service often included, round up','Tap Water':'Safe & cold from public fountains','Weather':'Avg 22-30°C, sun hat essential','Emergency':'112 / 113 police','Transport':'Metro (limited), buses, walking','Cultural Notes':'Cover shoulders/knees in churches'}},\n  {dest:'Barcelona, Spain',data:{'Time Zone':'CET (UTC+1)','Voltage & Plug':'230V · Type C/F','Language':'Catalan + Spanish','Tipping':'Not expected, 5% appreciated','Tap Water':'Safe but locals prefer bottled','Weather':'Avg 23-28°C, sea breeze','Emergency':'112','Transport':'Metro, Bicing bikes, walkable centre','Cultural Notes':'Late dinners (9pm+), siesta 2-5pm'}}\n];\nRENDERERS.kbyg = ()=>{\n  ensureKbyg();\n  return `\n    <div class=\"page-head\">\n      <div><h1>Know Before You Go</h1>\n        <p>Starter info is sample travel guidance. Edit every field and add stops as needed.</p>\n      </div>\n      <button class=\"btn btn-primary\" id=\"kb-add\">＋ Add Stop</button>\n    </div>\n    ${DB.kbyg.map((d,di)=>`<div class=\"card mb\">\n      <div class=\"card-head\"><input class=\"section-title-input\" value=\"${escape(d.dest)}\" data-kb-dest=\"${di}\"><button class=\"row-del\" data-kb-del=\"${di}\">×</button></div>\n      <div class=\"grid grid-3\">${Object.entries(d.data).map(([k,v])=>`\n        <div class=\"info-tile\"><div class=\"info-tile-label\">${escape(k)}</div><textarea data-kb=\"${di}\" data-key=\"${escape(k)}\">${escape(v)}</textarea></div>\n      `).join('')}</div>\n    </div>`).join('')}\n  `;\n};\nWIRES.kbyg = ()=>{\n  document.querySelectorAll('[data-kb-dest]').forEach(el=>el.addEventListener('input',()=>{ DB.kbyg[+el.dataset.kbDest].dest=el.value; save(); }));\n  document.querySelectorAll('[data-kb]').forEach(el=>el.addEventListener('input',()=>{ DB.kbyg[+el.dataset.kb].data[el.dataset.key]=el.value; save(); }));\n  document.querySelectorAll('[data-kb-del]').forEach(b=>b.addEventListener('click',()=>{ DB.kbyg.splice(+b.dataset.kbDel,1); save(); render(); }));\n  document.getElementById('kb-add').addEventListener('click',()=>{ DB.kbyg.push({dest:'New stop',data:{'Time Zone':'','Voltage & Plug':'','Language':'','Tipping':'','Tap Water':'','Weather':'','Emergency':'','Transport':'','Cultural Notes':''}}); save(); render(); });\n};\n\n/* ===================== ITINERARY ===================== *//* ===================== ITINERARY ===================== */\nRENDERERS.itinerary = ()=>{\n  DB.itinerary.forEach(d=>d.slots.sort((a,b)=>(a.time||'99:99').localeCompare(b.time||'9
