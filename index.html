.forEach(el=>el.addEventListener('input',()=>{ DB.itinerary[+el.dataset.itLoc].location=el.value; save(); }));\n  document.querySelectorAll('[data-it-time]').forEach(el=>el.addEventListener('change',()=>{ const [d,s]=el.dataset.itTime.split('-').map(Number); DB.itinerary[d].slots[s].time=el.value; DB.itinerary[d].slots.sort((a,b)=>(a.time||'99:99').localeCompare(b.time||'99:99')); save(); render(); }));\n  document.querySelectorAll('[data-it-act]').forEach(el=>el.addEventListener('input',()=>{ const [d,s]=el.dataset.itAct.split('-').map(Number); DB.itinerary[d].slots[s].activity=el.value; save(); }));\n  document.querySelectorAll('[data-it-add-slot]').forEach(b=> b.addEventListener('click',()=>{ const d=+b.dataset.itAddSlot; DB.itinerary[d].slots.push({time:'12:00',activity:'New activity'}); save(); render(); }));\n  document.querySelectorAll('[data-it-del-slot]').forEach(b=> b.addEventListener('click',()=>{ const [d,s]=b.dataset.itDelSlot.split('-').map(Number); DB.itinerary[d].slots.splice(s,1); save(); render(); }));\n  document.querySelectorAll('[data-it-del-day]').forEach(b=> b.addEventListener('click',()=>{ DB.itinerary.splice(+b.dataset.itDelDay,1); DB.itinerary.forEach((d,i)=>d.day=i+1); save(); render(); }));\n  document.getElementById('it-add').addEventListener('click',()=>{ const lastDay = DB.itinerary[DB.itinerary.length-1]; const nextDate = lastDay ? toISO(addDays(new Date(lastDay.date+'T00:00:00'),1)) : DB.overview.departure; DB.itinerary.push({day:DB.itinerary.length+1,date:nextDate,location:'New location',slots:[{time:'09:00',activity:'New activity'}]}); save(); render(); });\n};\n\n/* ===================== SIGHTSEEING ===================== *//* ===================== SIGHTSEEING ===================== */\nRENDERERS.sightseeing = ()=>{\n  const cats=['🏛️ Landmark','🎨 Museum','🚢 Tour','🌿 Nature','🏖️ Beach','🎭 Show','Other'];\n  const codes=Object.keys(DB.currency.rates);\n  const sorted = [...DB.sightseeing].sort((a,b)=>b.priority-a.priority);\n  return `\n    <div class=\"page-head\">\n      <div><h1>Sightseeing &amp; Activities</h1>\n        <p>Tick In Itinerary to push the activity into Smart Itinerary. Priority: 5 = must-do, 1 = optional.</p>\n      </div>\n      <button class=\"btn btn-primary\" id=\"ss-add\">＋ Add Activity</button>\n    </div>\n    <div class=\"card mb\">\n      <div class=\"fl\" style=\"gap:10px;flex-wrap:wrap;font-size:12px\">\n        <span class=\"badge badge-success\">5 Must-do</span><span class=\"badge badge-accent\">4 High</span><span class=\"badge badge-warning\">3 Medium</span><span class=\"badge badge-ghost\">1-2 Optional</span>\n      </div>\n    </div>\n    <div class=\"card\">\n      <div class=\"table-wrap\">\n        <table>\n          <thead><tr><th>Name</th><th>Destination</th><th>Category</th><th>Cost</th><th>Currency</th><th>Duration</th><th>Priority</th><th>In Itinerary</th><th>Attachments</th><th></th></tr></thead>\n          <tbody>${sorted.map(a=>{\n            const i=DB.sightseeing.findIndex(x=>x.id===a.id);\n            return `<tr data-i=\"${i}\">\n              <td><input type=\"text\" value=\"${escape(a.name)}\" data-k=\"name\"></td>\n              <td><input type=\"text\" value=\"${escape(a.dest)}\" data-k=\"dest\"></td>\n              <td><select class=\"wide-select\" data-k=\"cat\">${cats.map(c=>`<option ${c===a.cat?'selected':''}>${c}</option>`).join('')}</select></td>\n              <td><input type=\"number\" value=\"${a.cost}\" data-k=\"cost\" style=\"width:80px\"></td>\n              <td><select data-k=\"currency\">${codes.map(c=>`<option ${c===(a.currency||DB.overview.currency)?'selected':''}>${c}</option>`).join('')}</select></td>\n              <td><input type=\"text\" value=\"${escape(a.duration)}\" data-k=\"duration\"></td>\n              <td><input type=\"number\" min=\"1\" max=\"5\" value=\"${a.priority}\" data-k=\"priority\" style=\"width:60px\"></td>\n              <td style=\"text-align:center\"><input type=\"checkbox\" ${a.inItin?'checked':''} data-k=\"inItin\"></td>\n              <td>${attachmentList(a.attachments)}<label class=\"file-pill\">Add image/file<input type=\"file\" multiple accept=\"image/*,.pdf,.doc,.docx\" data-ss-file=\"${i}\"></label></td>\n              <td><button class=\"row-del\" data-del=\"${i}\">×</button></td>\n            </tr>`;\n          }).join('')}</tbody>\n        </table>\n      </div>\n    </div>\n  `;\n};\nWIRES.sightseeing = ()=>{\n  document.querySelectorAll('#content tr[data-i]').forEach(tr=>{\n    const i=+tr.dataset.i;\n    tr.querySelectorAll('[data-k]').forEach(el=>el.addEventListener(el.type==='text'?'input':'change',()=>{\n      const k = el.dataset.k;\n      let v = el.type==='checkbox'?el.checked:(el.type==='number'?+el.value:el.value);\n      DB.sightseeing[i][k]=v; save();\n      if(k==='inItin'||k==='priority') render();\n    }));\n  });\n  document.querySelectorAll('[data-ss-file]').forEach(el=>el.addEventListener('change',async()=>{ const i=+el.dataset.ssFile; DB.sightseeing[i].attachments=[...(DB.sightseeing[i].attachments||[]),...(await captureAttachmentsAsync(el.files))]; save(); render(); }));\n  document.querySelectorAll('[data-att-del]').forEach(b=>b.addEventListener('click',e=>{ const tr=e.target.closest('tr'); DB.sightseeing[+tr.dataset.i].attachments.splice(+b.dataset.attDel,1); save(); render(); }));\n  document.querySelectorAll('[data-del]').forEach(b=>b.addEventListener('click',()=>{ DB.sightseeing.splice(+b.dataset.del,1); save(); render(); }));\n  document.getElementById('ss-add').addEventListener('click',()=>{ DB.sightseeing.push({id:uid(),name:'New activity',cat:'Other',cost:0,currency:DB.overview.currency,duration:'2 hr',priority:3,inItin:false,dest:'',attachments:[]}); save(); render(); });\n};\n\n/* ===================== BOOKINGS CALENDAR/* ===================== BOOKINGS CALENDAR ===================== *//* ===================== BOOKINGS CALENDAR ===================== */\nRENDERERS.calendar = ()=>{\n  const selected = DB.calendarMonth || DB.overview.departure.slice(0,7);\n  const month = new Date(selected+'-01T00:00:00');\n  return `\n    <div class=\"page-head\">\n      <div><h1>Bookings Calendar</h1>\n        <p>Choose any month, then add date-based to-dos directly into the Trip Checklist.</p>\n      </div>\n      <div class=\"fl\" style=\"gap:10px;flex-wrap:wrap\">\n        <input type=\"month\" id=\"cal-month\" value=\"${selected}\">\n        <span class=\"fl\"><span style=\"width:12px;height:12px;background:var(--primary);border-radius:3px\"></span>Flight</span>\n        <span class=\"fl\"><span style=\"width:12px;height:12px;background:var(--secondary);border-radius:3px\"></span>Hotel</span>\n        <span class=\"fl\"><span style=\"width:12px;height:12px;background:var(--accent);border-radius:3px\"></span>Activity</span>\n        <span class=\"fl\"><span style=\"width:12px;height:12px;background:var(--warning);border-radius:3px\"></span>To Do</span>\n        <span class=\"fl\"><span style=\"width:12px;height:12px;background:var(--ink-mid);border-radius:3px\"></span>Transfer</span>\n      </div>\n    </div>\n    <div class=\"grid grid-1\">${renderCalMonth(month)}</div>\n  `;\n};\nfunction renderCalMonth(month){\n  const y=month.getFullYear(), m=month.getMonth();\n  const first=new Date(y,m,1), last=new Date(y,m+1,0);\n  const lead=first.getDay(), days=last.getDate();\n  const cells=[];\n  for(let i=0;i<lead;i++) cells.push('<div class=\"cal-cell muted\"></div>');\n  for(let d=1;d<=days;d++){\n    const iso=toISO(new Date(y,m,d));\n    const items=[\n      ...DB.bookings.filter(b=>b.date===iso).map(b=>({label:b.supplier,type:b.type})),\n      ...DB.checklist.flatMap(p=>p.tasks.filter(t=>t.date===iso).map(t=>({label:t.text,type:'To Do'})))\n    ];\n    cells.push(`<div class=\"cal-cell\" data-cal-date=\"${iso}\"><div class=\"cal-num\">${d}</div>${items.map(it=>`<div class=\"cal-event ${calClass(it.type)}\">${escape(it.label)}</div>`).join('')}</div>`);\n  }\n  return `<div class=\"card\"><div class=\"card-head\"><div class=\"card-title\">${month.toLocaleString(undefined,{month:'long',year:'numeric'})}</div><div class=\"card-sub\">Click any day to add a to-do</div></div><div class=\"cal-grid\">${['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d=>`<div class=\"cal-dow\">${d}</div>`).join('')}${cells.join('')}</div></div>`;\n}\nfunction calClass(type){\n  const t=(type||'').toLowerCase();\n  if(t.includes('flight')) return 'cal-flight';\n  if(t.includes('hotel')) return 'cal-hotel';\n  if(t.includes('activity')) return 'cal-activity';\n  if(t.includes('to do')) return 'cal-todo';\n  return 'cal-transfer';\n}\nWIRES.calendar = ()=>{\n  document.getElementById('cal-month').addEventListener('change',e=>{ DB.calendarMonth=e.target.value; save(); render(); });\n  document.querySelectorAll('[data-cal-date]').forEach(cell=>cell.addEventListener('click',()=>{\n    const text = prompt('Add a checklist to-do for this date');\n    if(!text) return;\n    let phase = DB.checklist.find(p=>p.phase==='Calendar To Do');\n    if(!phase){ phase={phase:'Calendar To Do',tasks:[]}; DB.checklist.push(phase); }\n    phase.tasks.push({id:uid(),text,date:cell.dataset.calDate,done:false});\n    save(); render(); toast('Added to Trip Checklist');\n  }));\n};\n\n/* ===================== BUDGET ===================== *//* ===================== BUDGET ===================== */\nRENDERERS.budget = ()=>{\n  ensureBudgetAllocations();\n  const cats = DB.budgetAllocations;\n  const total = DB.overview.budget;\n  const spent = totalSpent();\n  const allocated = Object.values(cats).reduce((a,b)=>a+(+b||0),0);\n  return `\n    <div class=\"page-head\">\n      <div><h1>Travel Budget</h1>\n        <p>Edit the Allocated % values. Allocated $ updates from your total budget.</p>\n      </div>\n    </div>\n    <div class=\"grid grid-2\">\n      <div class=\"card\">\n        <div class=\"card-head\"><div class=\"card-title\">Budget Allocation</div><div class=\"card-sub\">${money(total,DB.overview.currency)} across ${Object.keys(cats).length} categories</div></div>\n        <div class=\"budget-row budget-head\"><div>Category</div><div></div><div>Allocated %</div><div>Allocated $</div></div>\n        ${Object.entries(cats).map(([k,p])=>{\n          const amt = total*p/100;\n          return `<div class=\"budget-row budget-row-edit\">\n            <div><div class=\"budget-cat\">${escape(k)}</div></div>\n            <div class=\"budget-bar\"><span style=\"width:${Math.min(100,p)}%\"></span></div>\n            <div><input type=\"number\" value=\"${p}\" min=\"0\" max=\"100\" data-bud=\"${escape(k)}\" style=\"width:72px\"></div>\n            <div class=\"budget-amt\">${money(amt,DB.overview.currency)}</div>\n          </div>`;\n        }).join('')}\n      </div>\n      <div class=\"card\">\n        <div class=\"card-head\"><div class=\"card-title\">Summary</div></div>\n        <div class=\"grid grid-2\" style=\"gap:10px\">\n          <div class=\"info-tile\"><div class=\"info-tile-label\">Total Budget</div><div class=\"info-tile-val\">${money(total,DB.overview.currency)}</div></div>\n          <div class=\"info-tile\"><div class=\"info-tile-label\">Allocated</div><div class=\"info-tile-val\">${allocated}%</div></div>\n          <div class=\"info-tile\"><div class=\"info-tile-label\">Daily Avg</div><div class=\"info-tile-val\">${money(total/Math.max(1,tripNights()),DB.overview.currency)}</div></div>\n          <div class=\"info-tile\"><div class=\"info-tile-label\">Per Person</div><div class=\"info-tile-val\">${money(total/Math.max(1,DB.overview.travellers),DB.overview.currency)}</div></div>\n        </div>\n        <div class=\"mt\"><div class=\"fl spread\" style=\"font-size:12px;margin-bottom:6px\"><span class=\"mute\">Spent so far</span><b>${money(spent,DB.overview.currency)}</b></div><div class=\"progress\"><span style=\"width:${Math.min(100,spent/total*100)}%\"></span></div></div>\n        <div class=\"mt\"><div class=\"fl spread\" style=\"font-size:12px;margin-bottom:6px\"><span class=\"mute\">Remaining</span><b style=\"color:var(--success)\">${money(total-spent,DB.overview.currency)}</b></div><div class=\"progress progress-success\"><span style=\"width:${Math.max(0,(total-spent)/total*100)}%\"></span></div></div>\n      </div>\n    </div>\n  `;\n};\nWIRES.budget = ()=>{\n  document.querySelectorAll('[data-bud]').forEach(el=>el.addEventListener('change',()=>{ DB.budgetAllocations[el.dataset.bud]=+el.value; save(); render(); }));\n};\n\n/* ===================== EXPENSES/* ===================== EXPENSES ===================== */\nRENDERERS.expenses = ()=>{\n  ensureTravellers();\n  const spent = totalSpent();\n  const days = Math.max(1,tripNights());\n  const sorted = [...DB.expenses].sort((a,b)=>b.date.localeCompare(a.date));\n  const codes = Object.keys(DB.currency.rates);\n  const people = DB.overview.travellerList.map(t=>t.name).filter(Boolean);\n  return `\n    <div class=\"page-head\">\n      <div><h1>Expense Tracker</h1>\n        <p>Every spend, every currency — converted to ${escape(DB.overview.currency)} using Currency Converter rates.</p>\n      </div>\n      <button class=\"btn btn-primary\" id=\"exp-quick\">＋ Add Expense</button>\n    </div>\n    <div class=\"grid grid-3 mb\">\n      <div class=\"stat\"><div class=\"stat-label\">Total Spent</div><div class=\"stat-val\">${money(spent,DB.overview.currency)}</div><div class=\"stat-sub\">${DB.expenses.length} transactions</div></div>\n      <div class=\"stat stat-secondary\"><div class=\"stat-label\">Avg / Day</div><div class=\"stat-val\">${money(spent/days,DB.overview.currency)}</div><div class=\"stat-sub\">across ${days} nights</div></div>\n      <div class=\"stat stat-success\"><div class=\"stat-label\">Remaining Budget</div><div class=\"stat-val\">${money(DB.overview.budget-spent,DB.overview.currency)}</div><div class=\"stat-sub\">of ${money(DB.overview.budget,DB.overview.currency)}</div></div>\n    </div>\n    <div class=\"card\">\n      <div class=\"card-head\"><div><div class=\"card-title\">All Expenses</div><div class=\"card-sub\">Edit existing expenses directly</div></div><button class=\"btn btn-ghost btn-sm\" id=\"exp-csv\">Export CSV</button></div>\n      <div class=\"table-wrap\">\n        <table>\n          <thead><tr><th>Date</th><th>Category</th><th>Description</th><th>Amount</th><th>Currency</th><th>Paid By</th><th></th></tr></thead>\n          <tbody>${sorted.map(e=>{\n            const i=DB.expenses.indexOf(e);\n            return `<tr data-i=\"${i}\">\n              <td><input type=\"date\" value=\"${escape(e.date)}\" data-exp=\"date\"></td>\n              <td><input type=\"text\" value=\"${escape(e.category)}\" data-exp=\"category\"></td>\n              <td><input type=\"text\" value=\"${escape(e.description)}\" data-exp=\"description\"></td>\n              <td><input type=\"number\" value=\"${e.amount}\" data-exp=\"amount\" style=\"width:90px\"></td>\n              <td><select data-exp=\"currency\">${codes.map(c=>`<option ${c===e.currency?'selected':''}>${c}</option>`).join('')}</select></td>\n              <td><select data-exp=\"paidBy\">${people.map(p=>`<option ${p===e.paidBy?'selected':''}>${escape(p)}</option>`).join('')}</select></td>\n              <td><button class=\"row-del\" data-del=\"${i}\">×</button></td>\n            </tr>`;\n          }).join('')}</tbody>\n        </table>\n      </div>\n    </div>\n  `;\n};\nWIRES.expenses = ()=>{\n  document.querySelectorAll('[data-exp]').forEach(el=>el.addEventListener(el.type==='text'?'input':'change',()=>{\n    const i=+el.closest('tr').dataset.i, k=el.dataset.exp;\n    DB.expenses[i][k]=el.type==='number'?+el.value:el.value; save();\n    if(k==='amount'||k==='currency'||k==='date'||k==='paidBy') render();\n  }));\n  document.querySelectorAll('[data-del]').forEach(b=>b.addEventListener('click',()=>{ DB.expenses.splice(+b.dataset.del,1); save(); render(); }));\n  document.getElementById('exp-quick').addEventListener('click', openExpenseModal);\n  document.getElementById('exp-csv').addEventListener('click', exportCSV);\n};\n\n/* ===================== CURRENCY/* ===================== CURRENCY ===================== *//* ===================== CURRENCY ===================== */\nRENDERERS.currency = ()=>{\n  ensureCurrencyCards();\n  const rates = DB.currency.rates;\n  const codes = Object.keys(rates);\n  const currencyNames = {USD:'US Dollar',EUR:'Euro',GBP:'British Pound',AUD:'Australian Dollar',CAD:'Australian Dollar',NZD:'NZ Dollar',JPY:'Japanese Yen',CHF:'Swiss Franc',SEK:'Swedish Krona',NOK:'Norwegian Krone',DKK:'Danish Krone',THB:'Thai Baht',SGD:'Singapore Dollar',HKD:'Hong Kong Dollar',MXN:'Mexican Peso',INR:'Indian Rupee',IDR:'Indonesian Rupiah',VND:'Vietnamese Dong',ZAR:'South African Rand',BRL:'Brazilian Real'};\n  const addable = codes.filter(c=>c!==DB.currency.base && !DB.currency.quickCards.includes(c));\n  return `\n    <div class=\"page-head\"><div><h1>Currency Converter</h1><p>Choose which currency cards appear and edit exchange rates anytime.</p></div></div>\n    <div class=\"grid grid-2\">\n      <div class=\"card\">\n        <div class=\"card-head\"><div class=\"card-title\">Quick Converter</div></div>\n        <div class=\"grid grid-2\">\n          <div><label>Amount</label><input type=\"number\" id=\"cc-amt\" value=\"100\" step=\"1\"></div>\n          <div><label>From</label><select id=\"cc-from\">${codes.map(c=>`<option ${c===DB.currency.base?'selected':''}>${c}</option>`).join('')}</select></div>\n        </div>\n        <div class=\"cc-card-tools\">\n          <select id=\"cc-add-card\">${addable.map(c=>`<option value=\"${c}\">${c} · ${currencyNames[c]||''}</option>`).join('')}</select>\n          <button class=\"btn btn-secondary btn-sm\" id=\"cc-add-btn\" ${addable.length?'':'disabled'}>+ Add Card</button>\n        </div>\n        <div class=\"mt\" id=\"cc-results\"></div>\n      </div>\n      <div class=\"card\">\n        <div class=\"card-head\"><div class=\"card-title\">Exchange Rates</div><div class=\"card-sub\">Relative to USD. Example: EUR 0.92 means USD 1 = EUR 0.92.</div></div>\n        <div class=\"scroll-y\">\n          ${codes.map(c=>`<div class=\"cc-row\">\n            <div><span class=\"cc-code\">${c}</span><span class=\"cc-name\">${currencyNames[c]||''}</span></div>\n            <input class=\"cc-rate-input\" type=\"number\" step=\"0.0001\" value=\"${rates[c]}\" data-rate=\"${c}\">\n          </div>`).join('')}\n        </div>\n        <div class=\"mute\" style=\"font-size:11px;margin-top:10px;font-style:italic\">Update rates on your arrival day for spend tracking accuracy.</div>\n      </div>\n    </div>\n  `;\n};\nWIRES.currency = ()=>{\n  const update = ()=>{\n    ensureCurrencyCards();\n    const amt = +document.getElementById('cc-amt').value || 0;\n    const from = document.getElementById('cc-from').value;\n    const fromRate = DB.currency.rates[from] || 1;\n    const targets = DB.currency.quickCards.filter(c=>c!==from && DB.currency.rates[c]);\n    const baseAmt = amt / fromRate;\n    document.getElementById('cc-results').innerHTML = `<div class=\"grid grid-2 cc-card-grid\" style=\"gap:8px\">${targets.map(c=>`<div class=\"info-tile cc-card\"><button class=\"mini-x cc-remove-card\" data-cc-remove=\"${c}\" title=\"Remove card\">×</button><div class=\"info-tile-label\">${c}</div><div class=\"info-tile-val tabular\">${money(baseAmt * DB.currency.rates[c],c)}</div></div>`).join('')}</div>`;\n    document.querySelectorAll('[data-cc-remove]').forEach(btn=>btn.addEventListener('click',()=>{\n      DB.currency.quickCards = DB.currency.quickCards.filter(c=>c!==btn.dataset.ccRemove);\n      save(); render();\n    }));\n  };\n  document.getElementById('cc-amt').addEventListener('input',update);\n  document.getElementById('cc-from').addEventListener('change',update);\n  document.getElementById('cc-add-btn').addEventListener('click',()=>{\n    const sel = document.getElementById('cc-add-card');\n    if(!sel.value) return;\n    DB.currency.quickCards.push(sel.value);\n    save(); render();\n  });\n  document.querySelectorAll('[data-rate]').forEach(el=>el.addEventListener('change',()=>{ DB.currency.rates[el.dataset.rate]=+el.value || 1; save(); update(); toast('Exchange rate updated'); }));\n  update();\n};\n\n/* ===================== SPLIT/* ===================== SPLIT ===================== */\nfunction splitBalances(){\n  ensureTravellers();\n  const people = DB.split.people;\n  const balances = {}; people.forEach(p=>balances[p]=0);\n  DB.split.expenses.forEach(e=>{\n    const total = +e.total || 0;\n    const share = total / Math.max(1,people.length);\n    balances[e.paidBy] = (balances[e.paidBy]||0) + total - share;\n    people.filter(p=>p!==e.paidBy).forEach(p=>{ balances[p] = (balances[p]||0) - share; });\n  });\n  return balances;\n}\nfunction settlementRows(balances){\n  const debtors = Object.entries(balances).filter(([,v])=>v<-0.5).map(([name,v])=>({name,amount:-v}));\n  const creditors = Object.entries(balances).filter(([,v])=>v>0.5).map(([name,v])=>({name,amount:v}));\n  const rows=[];\n  let d=0,c=0;\n  while(d<debtors.length && c<creditors.length){\n    const amt=Math.min(debtors[d].amount, creditors[c].amount);\n    rows.push({from:debtors[d].name,to:creditors[c].name,amount:amt});\n    debtors[d].amount-=amt; creditors[c].amount-=amt;\n    if(debtors[d].amount<0.5) d++;\n    if(creditors[c].amount<0.5) c++;\n  }\n  return rows;\n}\nRENDERERS.split = ()=>{\n  ensureTravellers();\n  const people = DB.split.people;\n  const balances = splitBalances();\n  const settlements = settlementRows(balances);\n  return `\n    <div class=\"page-head\">\n      <div>\n        <h1>Split Expenses</h1>\n        <p>All shared expenses are split equally between travellers ticked for split expenses in Trip Overview. + means the person should receive money; − means the person should pay someone back.</p>\n      </div>\n      <button class=\"btn btn-primary\" id=\"sp-add\">＋ Shared Expense</button>\n    </div>\n    <div class=\"grid grid-2\">\n      <div class=\"card\">\n        <div class=\"card-head\"><div class=\"card-title\">Who Owes What</div></div>\n        ${people.map(p=>{ const b=balances[p]; const cls=Math.abs(b)<0.5?'bal-zero':(b>0?'bal-pos':'bal-neg'); const sign=b>0?'+':(b<0?'−':''); return `<div class=\"bal-card\"><div><div class=\"bal-name\">${escape(p)}</div><div class=\"mute\" style=\"font-size:11px\">${Math.abs(b)<0.5?'Settled':(b>0?'is owed':'owes')}</div></div><div class=\"bal-amt ${cls}\">${sign}${money(Math.abs(b),DB.overview.currency)}</div></div>`; }).join('')}\n        <div class=\"settle-box\">${settlements.length?settlements.map(r=>`<div class=\"settle-row\"><b>${escape(r.from)}</b> pays <b>${escape(r.to)}</b><span>${money(r.amount,DB.overview.currency)}</span></div>`).join(''):'<div class=\"mute\">No one owes anyone right now.</div>'}</div>\n      </div>\n      <div class=\"card\">\n        <div class=\"card-head\"><div><div class=\"card-title\">Shared Expenses</div><div class=\"card-sub\">Split method: Equal, based on Trip Overview split-expense ticks</div></div></div>\n        <div class=\"table-wrap\">\n          <table><thead><tr><th>Expense</th><th>Total</th><th>Paid By</th><th></th></tr></thead>\n            <tbody>${DB.split.expenses.map((e,i)=>`<tr>\n              <td><input type=\"text\" value=\"${escape(e.name)}\" data-sp=\"name\" data-i=\"${i}\"></td>\n              <td><input type=\"number\" value=\"${e.total}\" data-sp=\"total\" data-i=\"${i}\" style=\"max-width:100px\"></td>\n              <td><select data-sp=\"paidBy\" data-i=\"${i}\">${people.map(p=>`<option ${p===e.paidBy?'selected':''}>${escape(p)}</option>`).join('')}</select></td>\n              <td><button class=\"row-del\" data-spd=\"${i}\">×</button></td>\n            </tr>`).join('')}</tbody>\n          </table>\n        </div>\n      </div>\n    </div>\n  `;\n};\nWIRES.split = ()=>{\n  document.querySelectorAll('[data-sp]').forEach(el=>el.addEventListener('change',()=>{ const i=+el.dataset.i, k=el.dataset.sp; DB.split.expenses[i][k]=el.type==='number'?+el.value:el.value; DB.split.expenses[i].split='Equal'; save(); render(); }));\n  document.querySelectorAll('[data-spd]').forEach(b=>b.addEventListener('click',()=>{ DB.split.expenses.splice(+b.dataset.spd,1); save(); render(); }));\n  document.getElementById('sp-add').addEventListener('click',()=>{ DB.split.expenses.push({id:uid(),name:'New shared cost',total:0,paidBy:DB.split.people[0],split:'Equal'}); save(); render(); });\n};\n\n/* ===================== PACKING/* ===================== PACKING/* ===================== PACKING ===================== */\nRENDERERS.packing = ()=>{\n  ensurePackingMatrix();\n  const travellers = DB.overview.travellerList;\n  const tot = DB.packing.sections.reduce((a,s)=>a+s.items.length,0);\n  const packed = DB.packing.sections.reduce((a,s)=>a+s.items.filter(i=>i.packed).length,0);\n  const pct = tot?Math.round(packed/tot*100):0;\n  return `\n    <div class=\"page-head\"><div><h1>Packing List</h1><p>${packed} of ${tot} items packed · ${pct}% complete</p></div><div class=\"fl\" style=\"gap:8px\"><button class=\"btn btn-ghost\" id=\"pk-checkall\">Check All</button><button class=\"btn btn-ghost\" id=\"pk-uncheck\">Uncheck All</button></div></div>\n    <div class=\"card mb\"><div class=\"progress progress-accent\" style=\"height:12px\"><span style=\"width:${pct}%\"></span></div></div>\n    ${DB.packing.sections.map((s,si)=>{\n      const p=s.items.filter(i=>i.packed).length;\n      return `<div class=\"pack-section\" data-si=\"${si}\">\n        <div class=\"pack-head\" data-collapse=\"${si}\"><h4>${escape(s.name)} <span class=\"badge badge-ghost\">${p}/${s.items.length}</span></h4><div class=\"fl\" style=\"gap:8px\"><button class=\"btn btn-ghost btn-sm\" data-pk-add=\"${si}\">+ Item</button><span class=\"mute\" style=\"font-size:14px\">▾</span></div></div>\n        <div class=\"pack-list\">\n          <div class=\"pack-matrix-head\"><span>Item</span>${travellers.map(t=>`<span>${escape(t.name)}</span>`).join('')}<span></span></div>\n          ${s.items.map((it,ii)=>`<div class=\"pack-item matrix\"><span>${escape(it.name)}</span>${travellers.map((tr,ti)=>`<label class=\"matrix-cell\"><input type=\"checkbox\" ${it.byTraveller?.[tr.name]?'checked':''} data-pk-person=\"${si}-${ii}-${ti}\"></label>`).join('')}<button class=\"row-del\" data-pkd=\"${si}-${ii}\">×</button></div>`).join('')}\n        </div>\n      </div>`;\n    }).join('')}\n  `;\n};\nWIRES.packing = ()=>{\n  document.querySelectorAll('[data-pk-person]').forEach(el=>el.addEventListener('change',e=>{ e.stopPropagation(); const [s,i,ti]=el.dataset.pkPerson.split('-').map(Number); const name=DB.overview.travellerList[ti].name; DB.packing.sections[s].items[i].byTraveller[name]=el.checked; DB.packing.sections[s].items[i].packed=DB.overview.travellerList.every(t=>DB.packing.sections[s].items[i].byTraveller[t.name]); save(); render(); }));\n  document.querySelectorAll('[data-pkd]').forEach(b=>b.addEventListener('click',()=>{ const [s,i]=b.dataset.pkd.split('-').map(Number); DB.packing.sections[s].items.splice(i,1); save(); render(); }));\n  document.querySelectorAll('[data-pk-add]').forEach(b=>b.addEventListener('click',e=>{ e.stopPropagation(); const s=+b.dataset.pkAdd; const name=prompt('Item name?'); if(!name) return; const byTraveller={}; DB.overview.travellerList.forEach(t=>byTraveller[t.name]=false); DB.packing.sections[s].items.push({id:uid(),name,packed:false,byTraveller}); save(); render(); }));\n  document.querySelectorAll('[data-collapse]').forEach(h=>h.addEventListener('click',e=>{ if(e.target.closest('button')) return; h.parentElement.classList.toggle('collapsed'); }));\n  document.getElementById('pk-checkall').addEventListener('click',()=>{ DB.packing.sections.forEach(s=>s.items.forEach(i=>{ i.packed=true; i.byTraveller=i.byTraveller||{}; DB.overview.travellerList.forEach(t=>i.byTraveller[t.name]=true); })); save(); render(); toast('All packed ✓'); });\n  document.getElementById('pk-uncheck').addEventListener('click',()=>{ DB.packing.sections.forEach(s=>s.items.forEach(i=>{ i.packed=false; i.byTraveller=i.byTraveller||{}; DB.overview.travellerList.forEach(t=>i.byTraveller[t.name]=false); })); save(); render(); });\n};\n\n/* ===================== JOURNAL/* ===================== JOURNAL ===================== *//* ===================== JOURNAL ===================== */\nRENDERERS.journal = ()=>{\n  const sorted = [...DB.journal].sort((a,b)=>b.date.localeCompare(a.date));\n  const moods = ['😊','🤩','😐','😩'];\n  return `\n    <div class=\"page-head\"><div><h1>Travel Journal</h1><p>Add photos to capture the moment.</p></div><button class=\"btn btn-primary\" id=\"jr-add\">＋ Add Entry</button></div>\n    ${sorted.map(e=>{\n      const i = DB.journal.indexOf(e);\n      return `<div class=\"journal-entry\">\n        <div class=\"journal-head\"><input type=\"date\" value=\"${escape(e.date)}\" data-jr=\"${i}\" data-k=\"date\" style=\"width:145px\"><span class=\"journal-loc\">📍 ${escape(e.location)}</span><span class=\"journal-mood\">${e.mood}</span><span class=\"journal-rating\">${'★'.repeat(e.rating)}${'☆'.repeat(5-e.rating)}</span><button class=\"row-del\" data-jrd=\"${i}\" style=\"margin-left:auto\">×</button></div>\n        <div style=\"font-weight:600;font-size:14px;margin-bottom:6px\">${escape(e.highlight)}</div>\n        <textarea data-jr=\"${i}\" data-k=\"text\" style=\"background:var(--bg);border-color:var(--border)\">${escape(e.text)}</textarea>\n        <div style=\"margin-top:10px\"><label>Photo attachments</label>${attachmentList(e.attachments)}<label class=\"file-pill\">Add photos<input type=\"file\" multiple accept=\"image/*\" data-jr-file=\"${i}\"></label></div>\n        <div class=\"fl\" style=\"gap:14px;margin-top:10px;flex-wrap:wrap\">\n          <div><label style=\"margin-bottom:4px\">Mood</label><div class=\"fl\" style=\"gap:4px\">${moods.map(m=>`<span class=\"badge ${m===e.mood?'':'badge-ghost'}\" style=\"cursor:pointer;font-size:18px\" data-mood=\"${i}-${m}\">${m}</span>`).join('')}</div></div>\n          <div><label style=\"margin-bottom:4px\">Rating</label><select data-jr=\"${i}\" data-k=\"rating\">${[1,2,3,4,5].map(n=>`<option value=\"${n}\" ${n===e.rating?'selected':''}>${'★'.repeat(n)}</option>`).join('')}</select></div>\n          <div><label style=\"margin-bottom:4px\">Location</label><input type=\"text\" value=\"${escape(e.location)}\" data-jr=\"${i}\" data-k=\"location\"></div>\n          <div><label style=\"margin-bottom:4px\">Highlight</label><input type=\"text\" value=\"${escape(e.highlight)}\" data-jr=\"${i}\" data-k=\"highlight\"></div>\n        </div>\n      </div>`;\n    }).join('')}\n  `;\n};\nWIRES.journal = ()=>{\n  document.querySelectorAll('[data-jr]').forEach(el=>el.addEventListener(el.tagName==='TEXTAREA'||el.type==='text'?'input':'change',()=>{ const i=+el.dataset.jr, k=el.dataset.k; DB.journal[i][k]=k==='rating'?+el.value:el.value; save(); }));\n  document.querySelectorAll('[data-jr-file]').forEach(el=>el.addEventListener('change',async()=>{ const i=+el.dataset.jrFile; DB.journal[i].attachments=[...(DB.journal[i].attachments||[]),...(await captureAttachmentsAsync(el.files))]; save(); render(); }));\n  document.querySelectorAll('[data-att-del]').forEach(b=>b.addEventListener('click',e=>{ const entry=e.target.closest('.journal-entry'); const idx=[...document.querySelectorAll('.journal-entry')].indexOf(entry); const sorted=[...DB.journal].sort((a,b)=>b.date.localeCompare(a.date)); const item=sorted[idx]; DB.journal[DB.journal.indexOf(item)].attachments.splice(+b.dataset.attDel,1); save(); render(); }));\n  document.querySelectorAll('[data-mood]').forEach(el=>el.addEventListener('click',()=>{ const [i,m]=el.dataset.mood.split('-'); DB.journal[+i].mood=m; save(); render(); }));\n  document.querySelectorAll('[data-jrd]').forEach(b=>b.addEventListener('click',()=>{ DB.journal.splice(+b.dataset.jrd,1); save(); render(); }));\n  document.getElementById('jr-add').addEventListener('click',()=>{ DB.journal.unshift({id:uid(),date:toISO(new Date()),location:'New place',mood:'😊',highlight:'Today...',text:'',rating:5,attachments:[]}); save(); render(); });\n};\n\n/* ===================== BUCKET LIST/* ===================== BUCKET LIST ===================== */\nRENDERERS.bucket = ()=>{\n  const done = DB.bucket.filter(b=>b.status==='Done').length;\n  const dream = DB.bucket.length - done;\n  const statuses = ['Done','Planned','Dream'];\n  return `\n    <div class=\"page-head\"><div><h1>Bucket List</h1><p><span class=\"badge badge-success\">${done} visited</span> · <span class=\"badge badge-ghost\">${dream} dream destinations</span></p></div><button class=\"btn btn-primary\" id=\"bl-add\">＋ Add Destination</button></div>\n    <div class=\"grid grid-3\">\n      ${DB.bucket.map((b,i)=>{\n        const dotClass=b.status==='Done'?'done':b.status==='Planned'?'planned':'dream';\n        const badgeClass=b.status==='Done'?'badge-success':b.status==='Planned'?'badge-warning':'badge-ghost';\n        const icon=b.status==='Done'?'✓':b.status==='Planned'?'📌':'💭';\n        return `<div class=\"bucket-card\">\n          <div class=\"bucket-dot ${dotClass}\"></div><div class=\"bucket-flag\">${b.flag}</div>\n          <input class=\"bucket-name-input\" value=\"${escape(b.name)}\" data-bl=\"${i}\" data-k=\"name\">\n          <textarea class=\"bucket-why-input\" data-bl=\"${i}\" data-k=\"why\">${escape(b.why)}</textarea>\n          <div class=\"fl\" style=\"gap:8px;margin-bottom:6px\"><span class=\"badge ${badgeClass}\">${icon} ${escape(b.status)}</span><span style=\"color:var(--accent);font-size:13px\">${'★'.repeat(b.priority)}</span></div>\n          <div class=\"bucket-meta bucket-meta-edit\"><label>Best <input value=\"${escape(b.best)}\" data-bl=\"${i}\" data-k=\"best\"></label><label>Budget <input type=\"number\" value=\"${b.budget}\" data-bl=\"${i}\" data-k=\"budget\"></label></div>\n          <div style=\"margin-top:8px\">${attachmentList(b.attachments)}<label class=\"file-pill\">Add image/file<input type=\"file\" multiple accept=\"image/*,.pdf\" data-bl-file=\"${i}\"></label></div>\n          <div class=\"fl\" style=\"gap:6px;margin-top:10px\"><select data-bl=\"${i}\" data-k=\"status\" style=\"font-size:11px;padding:5px 8px\">${statuses.map(s=>`<option ${s===b.status?'selected':''}>${s}</option>`).join('')}</select><button class=\"row-del\" data-bld=\"${i}\">×</button></div>\n        </div>`;\n      }).join('')}\n    </div>\n  `;\n};\nWIRES.bucket = ()=>{\n  document.querySelectorAll('[data-bl]').forEach(el=>el.addEventListener(el.tagName==='TEXTAREA'||el.type==='text'?'input':'change',()=>{ DB.bucket[+el.dataset.bl][el.dataset.k]=el.type==='number'?+el.value:el.value; save(); if(el.tagName==='SELECT') render(); }));\n  document.querySelectorAll('[data-bl-file]').forEach(el=>el.addEventListener('change',async()=>{ const i=+el.dataset.blFile; DB.bucket[i].attachments=[...(DB.bucket[i].attachments||[]),...(await captureAttachmentsAsync(el.files))]; save(); render(); }));\n  document.querySelectorAll('[data-att-del]').forEach(b=>b.addEventListener('click',e=>{ const card=e.target.closest('.bucket-card'); const i=[...document.querySelectorAll('.bucket-card')].indexOf(card); DB.bucket[i].attachments.splice(+b.dataset.attDel,1); save(); render(); }));\n  document.querySelectorAll('[data-bld]').forEach(b=>b.addEventListener('click',()=>{ DB.bucket.splice(+b.dataset.bld,1); save(); render(); }));\n  document.getElementById('bl-add').addEventListener('click',()=>{ DB.bucket.push({id:uid(),name:'New destination',flag:'🗺️',why:'Why I want to go...',best:'Anytime',budget:2000,status:'Dream',priority:3,attachments:[]}); save(); render(); });\n};\n\n/* ===================== SAVINGS/* ===================== SAVINGS ===================== */\nRENDERERS.savings = ()=>{\n  const s = DB.savings;\n  const pct = Math.min(100, Math.round((s.current||0)/Math.max(1,s.goal||1)*100));\n  return `\n    <div class=\"page-head\"><div><h1>Savings Tracker</h1><p>You're ${pct}% of the way to your trip budget.</p></div></div>\n    <div class=\"grid grid-2\">\n      <div class=\"card\">\n        <div class=\"card-head\"><div class=\"card-title\">Trip Fund</div></div>\n        <div style=\"text-align:center;padding:14px 0\">\n          <div style=\"font-family:var(--font-head);font-size:64px;color:var(--primary);line-height:1\">${money(s.current,DB.overview.currency)}</div>\n          <div class=\"mute\" style=\"font-size:14px\">of ${money(s.goal,DB.overview.currency)} goal</div>\n        </div>\n        <div class=\"progress progress-success\" style=\"height:14px\"><span style=\"width:${pct}%\"></span></div>\n        <div class=\"fl spread\" style=\"font-size:12px;margin-top:6px\"><span class=\"mute\">${pct}% saved</span><span class=\"mute\">${money((s.goal||0)-(s.current||0),DB.overview.currency)} to go</span></div>\n        <div class=\"grid grid-2 mt\">\n          <div><label>Savings Goal</label><input type=\"number\" id=\"sv-goal\" value=\"${s.goal}\" step=\"100\"></div>\n          <div><label>Current Savings</label><input type=\"number\" id=\"sv-cur\" value=\"${s.current}\" step=\"50\"></div>\n        </div>\n      </div>\n      <div class=\"card\">\n        <div class=\"card-head\"><div class=\"card-title\">Monthly Contributions</div><button class=\"btn btn-ghost btn-sm\" id=\"sv-add\">+ Month</button></div>\n        <div class=\"table-wrap\">\n          <table>\n            <thead><tr><th>Month</th><th>Contributed</th><th>Running Total</th><th></th></tr></thead>\n            <tbody>${s.months.map((m,i)=>`<tr data-sv=\"${i}\">\n              <td><input value=\"${escape(m.month)}\" data-sv-k=\"month\"></td>\n              <td><input type=\"number\" value=\"${m.contributed}\" data-sv-k=\"contributed\"></td>\n              <td class=\"tabular\"><b>${money(m.running,DB.overview.currency)}</b></td>\n              <td><button class=\"row-del\" data-sv-del=\"${i}\">×</button></td>\n            </tr>`).join('')}</tbody>\n          </table>\n        </div>\n      </div>\n    </div>\n  `;\n};\nWIRES.savings = ()=>{\n  const recalc=()=>{ let run=0; DB.savings.months.forEach(m=>{ run += +m.contributed||0; m.running=run; }); DB.savings.current=run; };\n  document.getElementById('sv-goal').addEventListener('input',e=>{ DB.savings.goal=+e.target.value; save(); });\n  document.getElementById('sv-cur').addEventListener('input',e=>{ DB.savings.current=+e.target.value; save(); });\n  document.querySelectorAll('[data-sv-k]').forEach(el=>el.addEventListener('change',()=>{ const i=+el.closest('tr').dataset.sv; DB.savings.months[i][el.dataset.svK]=el.type==='number'?+el.value:el.value; recalc(); save(); render(); }));\n  document.querySelectorAll('[data-sv-del]').forEach(b=>b.addEventListener('click',()=>{ DB.savings.months.splice(+b.dataset.svDel,1); recalc(); save(); render(); }));\n  document.getElementById('sv-add').addEventListener('click',()=>{ const last=DB.savings.months[DB.savings.months.length-1]; DB.savings.months.push({month:'New month',contributed:0,running:last?last.running:0}); save(); render(); });\n};\n\n/* ===================== SETTINGS ===================== *//* ===================== SETTINGS ===================== */\nRENDERERS.settings = ()=>{\n  return `\n    <div class=\"page-head\"><div><h1>Settings</h1><p>Theme, backup, and reset options.</p></div></div>\n    <div class=\"grid grid-2\">\n      <div class=\"card\">\n        <div class=\"card-head\"><div class=\"card-title\">Appearance</div></div>\n        <label>Colour Theme</label>\n        <select id=\"st-theme\">\n          <option value=\"coastal\" ${DB.user.theme==='coastal'?'selected':''}>Coastal — deep navy &amp; sand</option>\n          <option value=\"tropical\" ${DB.user.theme==='tropical'?'selected':''}>Tropical — emerald &amp; mango</option>\n          <option value=\"desert\" ${DB.user.theme==='desert'?'selected':''}>Desert Luxe — sienna &amp; rust</option>\n        </select>\n        <div class=\"mute\" style=\"font-size:11px;margin-top:8px\">Applies instantly across the whole planner.</div>\n\n        <div style=\"margin-top:20px\"><label>Your Name</label>\n          <input type=\"text\" id=\"st-name\" value=\"${escape(DB.user.name)}\">\n        </div>\n      </div>\n      <div class=\"card\">\n        <div class=\"card-head\"><div class=\"card-title\">Data &amp; Backup</div></div>\n        <p class=\"mute\" style=\"font-size:13px\">Your trip is saved automatically in this browser. Export a JSON file to back it up (works on any computer) or to move between devices.</p>\n        <div class=\"fl\" style=\"gap:8px;flex-wrap:wrap;margin-top:8px\">\n          <button class=\"btn btn-primary\" id=\"st-export\">📤 Export JSON</button>\n          <button class=\"btn btn-secondary\" id=\"st-import\">📥 Import JSON</button>\n          <button class=\"btn btn-ghost\" id=\"st-csv\">📊 Export Expenses (CSV)</button>\n        </div>\n        <div class=\"mute\" style=\"font-size:11px;margin-top:10px;font-style:italic\">JSON is a portable text format. Open it in any text editor; re-import it to restore everything exactly as it was.</div>\n      </div>\n      <div class=\"card\">\n        <div class=\"card-head\"><div class=\"card-title\">Password Encryption</div></div>\n        <p class=\"mute\" style=\"font-size:13px\">Protect saved planner data and encrypted backups with AES-256-GCM. The password is never stored, so forgotten passwords cannot be recovered.</p>\n        <div class=\"fl\" style=\"gap:8px;flex-wrap:wrap;margin-top:8px\">\n          ${ENC_ENABLED\n            ? `<button class=\"btn btn-secondary\" id=\"st-enc-change\">🔐 Change Password</button><button class=\"btn btn-danger\" id=\"st-enc-disable\">Disable Encryption</button>`\n            : `<button class=\"btn btn-primary\" id=\"st-enc-enable\">🔐 Enable AES-256 Encryption</button>`}\n          <button class=\"btn btn-ghost\" id=\"st-export-enc\">Export Encrypted Backup</button>\n        </div>\n        <div class=\"mute\" style=\"font-size:11px;margin-top:10px\">Status: <b>${ENC_ENABLED?'Encrypted':'Not encrypted'}</b></div>\n      </div>\n      <div class=\"card\">\n        <div class=\"card-head\"><div class=\"card-title\">Reset</div></div>\n        <p class=\"mute\" style=\"font-size:13px\">Start from scratch or restore the sample trip data.</p>\n        <div class=\"fl\" style=\"gap:8px;flex-wrap:wrap;margin-top:8px\">\n          <button class=\"btn btn-secondary\" id=\"st-demo\">🌍 Reload Demo Data</button>\n          <button class=\"btn btn-danger\" id=\"st-blank\">🗑️ Reset to Blank</button>\n        </div>\n      </div>\n      <div class=\"card\">\n        <div class=\"card-head\"><div class=\"card-title\">About</div></div>\n        <p style=\"font-size:13px;line-height:1.7;margin:0\">\n          <b>Ultimate Travel Planner</b><br>\n          LifePlanned · Version 1.0<br>\n          <span class=\"mute\">Single-file HTML · runs offline after first load</span><br><br>\n          <span class=\"mute\" style=\"font-size:11px\">Personal use only. © LifePlanned.</span>\n        </p>\n      </div>\n    </div>\n  `;\n};\nWIRES.settings = ()=>{\n  document.getElementById('st-theme').addEventListener('change',e=>{\n    DB.user.theme=e.target.value;\n    document.documentElement.setAttribute('data-theme',e.target.value);\n    save(); toast('Theme changed');\n  });\n  document.getElementById('st-name').addEventListener('input',e=>{ DB.user.name=e.target.value; save(); });\n  document.getElementById('st-export').addEventListener('click', exportJSON);\n  document.getElementById('st-import').addEventListener('click',()=>document.getElementById('importFile').click());\n  document.getElementById('st-csv').addEventListener('click', exportCSV);\n  document.getElementById('st-export-enc').addEventListener('click', exportEncryptedBackup);\n  const encEnable = document.getElementById('st-enc-enable');\n  if(encEnable) encEnable.addEventListener('click',()=>enableEncryption());\n  const encChange = document.getElementById('st-enc-change');\n  if(encChange) encChange.addEventListener('click',()=>changeEncryptionPassword());\n  const encDisable = document.getElementById('st-enc-disable');\n  if(encDisable) encDisable.addEventListener('click',disableEncryption);\n  document.getElementById('st-demo').addEventListener('click',()=> confirmDialog('Reload demo data?','This replaces your current trip with the Summer Escape 2025 sample.',()=>{ DB=buildDemo(); DB.user.onboarded=true; document.documentElement.setAttribute('data-theme',DB.user.theme); save(); render(); toast('Demo data reloaded 🌍'); }));\n  document.getElementById('st-blank').addEventListener('click',()=> confirmDialog('Reset to blank?','All trip data will be erased. You will be guided through onboarding again.',()=>{ localStorage.removeItem(STORE); location.reload(); }));\n};\n\n/* ----------------- EXPORT / IMPORT ----------------- */\nfunction downloadJSON(data, filename){\n  const blob = new Blob([JSON.stringify(data,null,2)],{type:'application/json'});\n  const url = URL.createObjectURL(blob);\n  const a = document.createElement('a');\n  a.href=url; a.download=filename; a.click();\n  URL.revokeObjectURL(url);\n}\nfunction exportJSON(){\n  const ts = new Date().toISOString().replace(/[:.]/g,'-').slice(0,19);\n  downloadJSON(DB, `travel-planner-${ts}.json`);\n  toast('Data exported 📤');\n}\nasync function exportEncryptedBackup(){\n  if(!crypto?.subtle){ toast('Encryption is not available in this browser'); return; }\n  const pw = prompt('Password for this encrypted backup');\n  if(!pw) return;\n  const encrypted = await encryptPlannerData(DB, pw);\n  const ts = new Date().toISOString().replace(/[:.]/g,'-').slice(0,19);\n  downloadJSON(encrypted, `travel-planner-encrypted-${ts}.json`);\n  toast('Encrypted backup exported 🔐');\n}\nfunction exportCSV(){\n  const rows = [['Date','Category','Description','Amount','Currency','Paid By']];\n  DB.expenses.forEach(e=> rows.push([e.date,e.category,e.description,e.amount,e.currency,e.paidBy]));\n  const csv = rows.map(r=> r.map(c=>{ const s = (c+'').replace(/\"/g,'\"\"'); return /[\",\\n]/.test(s) ? `\"${s}\"` : s }).join(',')).join('\\n');\n  const blob = new Blob([csv],{type:'text/csv'});\n  const url = URL.createObjectURL(blob);\n  const a = document.createElement('a');\n  a.href=url; a.download=`expenses-${new Date().toISOString().slice(0,10)}.csv`; a.click();\n  URL.revokeObjectURL(url);\n  toast('CSV exported 📊');\n}\ndocument.getElementById('importFile').addEventListener('change',e=>{\n  const f=e.target.files[0]; if(!f) return;\n  const r=new FileReader();\n  r.onload = ev=>{\n    try{\n      const data = JSON.parse(ev.target.result);\n      const finishImport = imported=>{\n        confirmDialog('Import this file?','Your current trip will be replaced.',()=>{\n          DB = imported;\n          document.documentElement.setAttribute('data-theme', DB.user?.theme||'coastal');\n          save(); render(); toast('Import successful ✓');\n        });\n      };\n      if(isEncryptedPayload(data)){\n        const pw = prompt('Password for this encrypted backup');\n        if(!pw) return;\n        decryptPlannerData(data, pw).then(finishImport).catch(()=>toast('Could not decrypt backup ⚠'));\n      }else{\n        finishImport(data);\n      }\n    }catch(err){ toast('Invalid JSON file ⚠'); }\n  };\n  r.readAsText(f);\n  e.target.value='';\n});\n\n/* ----------------- MODALS ----------------- */\nfunction openExpenseModal(){\n  ensureTravellers();\n  document.getElementById('ex-date').value = toISO(new Date());\n  document.getElementById('ex-amt').value = '';\n  document.getElementById('ex-desc').value = '';\n  document.getElementById('ex-paid').innerHTML = DB.overview.travellerList.map(t=>`<option>${escape(t.name)}</option>`).join('');\n  document.getElementById('ex-paid').value = DB.overview.travellerList[0]?.name || DB.user.name;\n  document.getElementById('ex-cur').value = DB.overview.currency;\n  document.getElementById('expBg').classList.add('show');\n}\nfunction openBookingModal(){\n  document.getElementById('bk-date').value = toISO(new Date());\n  document.getElementById('bk-sup').value = '';\n  document.getElementById('bk-ref').value = '';\n  document.getElementById('bk-cost').value = '';\n  document.getElementById('bk-notes').value = '';\n  document.getElementById('bk-cur').value = DB.overview.currency;\n  document.getElementById('bkBg').classList.add('show');\n}\nfunction confirmDialog(title,msg,onYes){\n  document.getElementById('conf-title').textContent=title;\n  document.getElementById('conf-msg').textContent=msg;\n  const yes = document.getElementById('conf-yes');\n  const ny = yes.cloneNode(true); yes.replaceWith(ny);\n  ny.addEventListener('click',()=>{ document.getElementById('confirmBg').classList.remove('show'); onYes(); });\n  document.getElementById('confirmBg').classList.add('show');\n}\ndocument.querySelectorAll('[data-close]').forEach(el=> el.addEventListener('click',()=> document.getElementById(el.dataset.close).classList.remove('show')));\ndocument.querySelectorAll('.modal-bg').forEach(bg=> bg.addEventListener('click',e=>{ if(e.target===bg) bg.classList.remove('show') }));\n\ndocument.getElementById('ex-save').addEventListener('click',()=>{\n  const amt = +document.getElementById('ex-amt').value;\n  const desc = document.getElementById('ex-desc').value;\n  if(!amt || !desc){ toast('Add amount + description ⚠'); return; }\n  DB.expenses.push({\n    id:uid(),\n    date:document.getElementById('ex-date').value,\n    category:document.getElementById('ex-cat').value.replace(/^[^A-Za-z]+/,'').trim(),\n    description:desc,\n    amount:amt,\n    currency:document.getElementById('ex-cur').value,\n    paidBy:document.getElementById('ex-paid').value||DB.user.name,\n    shared:false\n  });\n  save();\n  document.getElementById('expBg').classList.remove('show');\n  toast('Expense added ✓');\n  if(CURRENT_PAGE==='expenses' || CURRENT_PAGE==='dashboard') render();\n});\ndocument.getElementById('bk-save').addEventListener('click',()=>{\n  const sup = document.getElementById('bk-sup').value;\n  if(!sup){ toast('Supplier required ⚠'); return; }\n  DB.bookings.push({\n    id:uid(),\n    type:document.getElementById('bk-type').value,\n    supplier:sup,\n    ref:document.getElementById('bk-ref').value,\n    date:document.getElementById('bk-date').value,\n    time:document.getElementById('bk-time').value,\n    cost:+document.getElementById('bk-cost').value||0,\n    currency:document.getElementById('bk-cur').value,\n    status:document.getElementById('bk-status').value,\n    notes:document.getElementById('bk-notes').value\n  });\n  save();\n  document.getElementById('bkBg').classList.remove('show');\n  toast('Booking added ✓');\n  if(CURRENT_PAGE==='bookings'||CURRENT_PAGE==='dashboard'||CURRENT_PAGE==='calendar') render();\n});\n\n/* ----------------- ONBOARDING ----------------- */\nlet ONB_STEP = 1, ONB_THEME='coastal', ONB_TRIP='couple', ONB_NAME='';\nfunction startOnboarding(){\n  ONB_STEP=1; ONB_NAME=''; ONB_THEME='coastal'; ONB_TRIP='couple';\n  document.getElementById('onbBg').classList.add('show');\n  renderOnb();\n}\nfunction renderOnb(){\n  const m = document.getElementById('onbModal');\n  if(ONB_STEP===1){\n    m.innerHTML=`\n      <div class=\"fl\" style=\"gap:12px;margin-bottom:8px\">\n        <div style=\"font-size:36px\">✈️</div>\n        <div><h2>Welcome to your travel planner</h2><div class=\"modal-sub\">Let's set up your trip in 3 quick steps.</div></div>\n      </div>\n      <div style=\"margin-top:12px\">\n        <label>What's your name?</label>\n        <input type=\"text\" id=\"onb-name\" placeholder=\"e.g. Sam\" value=\"${escape(ONB_NAME)}\" autofocus>\n      </div>\n      <div class=\"mute\" style=\"font-size:11px;margin-top:8px\">Step 1 of 3</div>\n      <div class=\"modal-actions\">\n        <button class=\"btn btn-primary\" id=\"onb-next\">Continue →</button>\n      </div>`;\n    document.getElementById('onb-name').addEventListener('input',e=> ONB_NAME=e.target.value);\n    document.getElementById('onb-next').addEventListener('click',()=>{\n      if(!ONB_NAME.trim()) ONB_NAME='Friend';\n      ONB_STEP=2; renderOnb();\n    });\n  } else if(ONB_STEP===2){\n    const themes=[\n      {k:'coastal',name:'Coastal',swatch:'linear-gradient(135deg,#1B4F72 50%,#F0B27A 50%)'},\n      {k:'tropical',name:'Tropical',swatch:'linear-gradient(135deg,#1E8449 50%,#F39C12 50%)'},\n      {k:'desert',name:'Desert Luxe',swatch:'linear-gradient(135deg,#784212 50%,#C0392B 50%)'}\n    ];\n    const tripTypes=[\n      {k:'solo',e:'🧳',name:'Solo'},{k:'couple',e:'💑',name:'Couple'},\n      {k:'group',e:'👥',name:'Group'},{k:'family',e:'👨‍👩‍👧',name:'Family'},\n      {k:'roadtrip',e:'🚗',name:'Road Trip'},{k:'cruise',e:'🚢',name:'Cruise'}\n    ];\n    m.innerHTML=`\n      <h2>Pick your vibe, ${escape(ONB_NAME)}</h2>\n      <div class=\"modal-sub\">Theme and trip type — both can be changed later.</div>\n      <label style=\"margin-top:14px\">Colour theme</label>\n      <div class=\"grid grid-3\" style=\"gap:10px\">\n        ${themes.map(t=>`<div class=\"theme-swatch ${t.k===ONB_THEME?'sel':''}\" data-th=\"${t.k}\">\n          <div class=\"theme-disc\" style=\"background:${t.swatch}\"></div>\n          <div class=\"theme-name\">${t.name}</div>\n        </div>`).join('')}\n      </div>\n      <label style=\"margin-top:18px\">Trip type</label>\n      <div class=\"tt-grid\">\n        ${tripTypes.map(t=>`<div class=\"tt-pick ${t.k===ONB_TRIP?'sel':''}\" data-tt=\"${t.k}\">\n          <span class=\"tt-emoji\">${t.e}</span>${t.name}\n        </div>`).join('')}\n      </div>\n      <div class=\"mute\" style=\"font-size:11px;margin-top:14px\">Step 2 of 3</div>\n      <div class=\"modal-actions\">\n        <button class=\"btn btn-ghost\" id=\"onb-back\">← Back</button>\n        <button class=\"btn btn-primary\" id=\"onb-next\">Continue →</button>\n      </div>`;\n    m.querySelectorAll('[data-th]').forEach(el=> el.addEventListener('click',()=>{ ONB_THEME=el.dataset.th; document.documentElement.setAttribute('data-theme',ONB_THEME); renderOnb(); }));\n    m.querySelectorAll('[data-tt]').forEach(el=> el.addEventListener('click',()=>{ ONB_TRIP=el.dataset.tt; renderOnb(); }));\n    document.getElementById('onb-back').addEventListener('click',()=>{ ONB_STEP=1; renderOnb() });\n    document.getElementById('onb-next').addEventListener('click',()=>{ ONB_STEP=3; renderOnb() });\n  } else {\n    m.innerHTML=`\n      <div style=\"text-align:center;padding:8px 0 6px\">\n        <div style=\"font-size:48px;margin-bottom:6px\">🎉</div>\n        <h2>You're all set, ${escape(ONB_NAME)}.</h2>\n        <div class=\"modal-sub\" style=\"margin-top:8px\">Your planner is pre-loaded with a 30-day sample trip — <b>Summer Escape 2025 · Paris → Rome → Barcelona</b>. Explore every page to see how it works.</div>\n      </div>\n      <div class=\"card\" style=\"background:var(--bg);border:1px solid var(--border);padding:14px;font-size:13px\">\n        💡 <b>Tip:</b> When you're ready to plan your own trip, go to <b>Settings → Reset to Blank</b>. To bring back the sample, use <b>Reload Demo Data</b>.\n      </div>\n      <div class=\"mute\" style=\"font-size:11px;margin-top:14px\">Step 3 of 3</div>\n      <div class=\"modal-actions\">\n        <button class=\"btn btn-ghost\" id=\"onb-back\">← Back</button>\n        <button class=\"btn btn-primary\" id=\"onb-finish\">Start Exploring →</button>\n      </div>`;\n    document.getElementById('onb-back').addEventListener('click',()=>{ ONB_STEP=2; renderOnb() });\n    document.getElementById('onb-finish').addEventListener('click',()=>{\n      DB.user.name = ONB_NAME;\n      DB.user.theme = ONB_THEME;\n      DB.user.tripType = ONB_TRIP;\n      DB.user.onboarded = true;\n      const tt = {solo:'Solo',couple:'Couple',group:'Group',family:'Family',roadtrip:'Road Trip',cruise:'Cruise'}[ONB_TRIP];\n      DB.overview.tripType = tt;\n      save();\n      document.getElementById('onbBg').classList.remove('show');\n      render();\n      toast('Welcome aboard ✈️');\n    });\n  }\n}\n\n/* ----------------- SIDEBAR / TOP ----------------- */\ndocument.getElementById('collapseBtn').addEventListener('click',()=>{\n  const sb = document.getElementById('sidebar');\n  sb.classList.toggle('collapsed');\n  document.getElementById('collapseBtn').textContent = sb.classList.contains('collapsed')?'›':'‹';\n});\ndocument.getElementById('hamburger').addEventListener('click',()=>{\n  document.getElementById('sidebar').classList.add('mobile-open');\n  document.getElementById('sidebarOverlay').classList.add('show');\n});\ndocument.getElementById('sidebarOverlay').addEventListener('click', closeMobile);\nfunction closeMobile(){\n  document.getElementById('sidebar').classList.remove('mobile-open');\n  document.getElementById('sidebarOverlay').classList.remove('show');\n}\ndocument.getElementById('addExpBtn').addEventListener('click', openExpenseModal);\ndocument.getElementById('themeMoon').addEventListener('click', toggleDarkMode);\ndocument.getElementById('printRun').addEventListener('click', runPrintChoice);\n\n/* ----------------- BOOT ----------------- */\nfunction bootUnlocked(){\n  document.documentElement.setAttribute('data-theme', DB.user?.theme || 'coastal');\n  renderNav();\n  render();\n  if(!DB.user.onboarded) setTimeout(startOnboarding, 250);\n}\nconst ACCESS_CODE = \"TP2026\";\nfunction bootstrap(){\n  const bootState = load();\n  if(bootState === 'locked') showUnlockScreen();\n  else bootUnlocked();\n}\nconst entered = prompt(\"Enter access code to open your Travel Planner:\");\nif (entered === ACCESS_CODE) {\n  bootstrap();\n} else {\n  document.body.innerHTML = \"<div class='access-denied'><h2>Access denied</h2><p>Please refresh the page and try again.</p></div>\";\n}\n<\/script>\n\n\n</body></html>"
  </script>
